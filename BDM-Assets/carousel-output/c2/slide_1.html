<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Pretendard'; src: url('file:///Users/jeongseongyeong/Library/Fonts/Pretendard-Regular.ttf'); font-weight: 400; }
  @font-face { font-family: 'Pretendard'; src: url('file:///Users/jeongseongyeong/Library/Fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  @font-face { font-family: 'Pretendard'; src: url('file:///Users/jeongseongyeong/Library/Fonts/Pretendard-SemiBold.ttf'); font-weight: 600; }
  @font-face { font-family: 'Pretendard'; src: url('file:///Users/jeongseongyeong/Library/Fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'Pretendard'; src: url('file:///Users/jeongseongyeong/Library/Fonts/Pretendard-ExtraBold.ttf'); font-weight: 800; }

  :root { --accent: #39FF14; }
  * { margin: 0; padding: 0; box-sizing: border-box; word-break: keep-all; overflow-wrap: break-word; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }

  .slide {
    width: 1080px; height: 1350px;
    position: relative; overflow: hidden;
    background: #0A0A0A;
  }

  .bg-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }

  .bg-grad {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg,
      rgba(10,10,10,0.1) 0%,
      rgba(10,10,10,0.3) 30%,
      rgba(10,10,10,0.7) 50%,
      #0A0A0A 70%);
  }

  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 6px; background: var(--accent); z-index: 5;
  }

  .cat-tag {
    position: absolute; top: 52px; left: 72px;
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    font-size: 20px; font-weight: 600;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.5); z-index: 5;
  }

  .mute {
    position: absolute; top: 52px; right: 36px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.45); z-index: 5;
    display: flex; align-items: center; justify-content: center;
  }
  .mute svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); }

  .content {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 80px 100px; z-index: 3;
  }

  .source-tag {
    font-size: 20px; font-weight: 600;
    color: var(--accent); letter-spacing: 1px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 78px; font-weight: 800;
    line-height: 1.25; color: #fff;
    letter-spacing: -2px; margin-bottom: 28px;
  }
  h1 .acc, h1 strong { color: var(--accent); }

  .sub {
    font-size: 30px; font-weight: 400;
    color: rgba(255,255,255,0.4);
  }

  .footer {
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center; font-size: 18px; font-weight: 500;
    font-style: italic; letter-spacing: 1px;
    color: rgba(255,255,255,0.2); z-index: 5;
  }
</style>
</head>
<body>
<div class="slide">
  <video class="bg-video" autoplay muted loop playsinline>

  </video>
  <div class="bg-grad"></div>
  <div class="top-bar"></div>

  <div class="content">

    <h1>네이버는<br><strong>'계산기'</strong>가<br>되었다.</h1>
    <div class="sub">당신의 마케팅은 안전합니까?</div>
  </div>
  <div class="footer">BDM Lab · @bdm.lab</div>
</div>
</body>
</html>
