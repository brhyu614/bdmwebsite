<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Pretendard'; src: url('file://{{ home }}/Library/Fonts/Pretendard-Regular.ttf'); font-weight: 400; }
  @font-face { font-family: 'Pretendard'; src: url('file://{{ home }}/Library/Fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  @font-face { font-family: 'Pretendard'; src: url('file://{{ home }}/Library/Fonts/Pretendard-SemiBold.ttf'); font-weight: 600; }
  @font-face { font-family: 'Pretendard'; src: url('file://{{ home }}/Library/Fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'Pretendard'; src: url('file://{{ home }}/Library/Fonts/Pretendard-ExtraBold.ttf'); font-weight: 800; }
  @font-face { font-family: 'Pretendard'; src: url('file://{{ home }}/Library/Fonts/Pretendard-Black.ttf'); font-weight: 900; }

  :root { --accent: {{ accent }}; }
  * { margin: 0; padding: 0; box-sizing: border-box; word-break: keep-all; overflow-wrap: break-word; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }

  .slide {
    width: 1080px; height: 1350px;
    position: relative; overflow: hidden;
  }

  /* Background video */
  .bg-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
  }

  .bg-grad {
    position: absolute; inset: 0; z-index: 1;
  }

  /* ── 왼쪽 사이드 바 (커버와 일관성) ── */
  .side-bar {
    position: absolute; top: 0; left: 0;
    width: 10px; height: 100%;
    z-index: 5;
  }

  /* ── 슬라이드 넘버 워터마크 ── */
  .slide-watermark {
    position: absolute;
    top: 120px; right: -20px;
    font-size: 300px; font-weight: 900;
    line-height: 1; letter-spacing: -15px;
    z-index: 2; pointer-events: none;
  }

  /* ── 태그 영역 ── */
  .tag-area {
    position: absolute; top: 52px; left: 56px;
    display: flex; align-items: center; gap: 16px;
    z-index: 5;
  }

  .tag-pill {
    display: inline-block;
    padding: 6px 18px;
    font-size: 16px; font-weight: 800;
    letter-spacing: 2px; text-transform: uppercase;
    border-radius: 4px;
  }

  .slide-num {
    font-size: 16px; font-weight: 700;
    letter-spacing: 1px;
  }

  .mute {
    position: absolute; top: 52px; right: 36px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.45); z-index: 5;
    display: flex; align-items: center; justify-content: center;
  }
  .mute svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); }

  /* ── 구분선 (태그 아래) ── */
  .tag-divider {
    position: absolute; top: 110px; left: 56px;
    width: 80px; height: 3px; z-index: 5;
  }

  .text-area {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 56px 100px; z-index: 3;
  }

  .text-area h2 {
    font-size: 54px; font-weight: 800;
    line-height: 1.3; margin-bottom: 32px;
    letter-spacing: -1px;
  }

  .text-area .body {
    font-size: 28px; font-weight: 400; line-height: 1.85;
  }
  .text-area .body strong { font-weight: 700; }

  .footer {
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center; font-size: 18px; font-weight: 500;
    font-style: italic; letter-spacing: 1px; z-index: 5;
  }

  /* ── Variant gradients ── */
  .dark .bg-grad {
    background: linear-gradient(180deg,
      rgba(17,17,17,0.1) 0%, rgba(17,17,17,0.2) 30%,
      rgba(17,17,17,0.7) 50%, #111 65%);
  }
  .light .bg-grad {
    background: linear-gradient(180deg,
      rgba(250,250,250,0.0) 0%, rgba(250,250,250,0.2) 30%,
      rgba(250,250,250,0.75) 50%, #FAFAFA 65%);
  }
  .green .bg-grad {
    background: linear-gradient(180deg,
      {{ accent }}00 0%, {{ accent }}4D 35%,
      {{ accent }}D9 55%, {{ accent }} 68%);
  }

  /* ── Dark variant ── */
  .dark { background: #111; }
  .dark .side-bar { background: var(--accent); }
  .dark .slide-watermark { color: rgba(255,255,255,0.03); }
  .dark .tag-pill { background: var(--accent); color: #0A0A0A; }
  .dark .tag-divider { background: var(--accent); }
  .dark .slide-num { color: rgba(255,255,255,0.25); }
  .dark .text-area h2 { color: #fff; }
  .dark .text-area h2 .acc { color: var(--accent); }
  .dark .text-area .body { color: rgba(255,255,255,0.55); }
  .dark .text-area .body strong { color: #fff; }
  .dark .text-area .body .hl { color: var(--accent); font-weight: 700; }
  .dark .footer { color: rgba(255,255,255,0.2); }

  /* ── Light variant ── */
  .light { background: #FAFAFA; }
  .light .side-bar { background: var(--accent); }
  .light .slide-watermark { color: rgba(0,0,0,0.03); }
  .light .tag-pill { background: var(--accent); color: #0A0A0A; }
  .light .tag-divider { background: var(--accent); }
  .light .slide-num { color: rgba(0,0,0,0.15); }
  .light .text-area h2 { color: #1A1A1A; }
  .light .text-area h2 .acc { color: var(--accent); }
  .light .text-area .body { color: rgba(30,30,30,0.5); }
  .light .text-area .body strong { color: #1A1A1A; }
  .light .text-area .body .hl { color: var(--accent); font-weight: 700; }
  .light .footer { color: rgba(30,30,30,0.2); }

  /* ── Green variant ── */
  .green { background: var(--accent); }
  .green .side-bar { background: #fff; }
  .green .slide-watermark { color: rgba(255,255,255,0.08); }
  .green .tag-pill { background: #fff; color: var(--accent); }
  .green .tag-divider { background: #fff; }
  .green .slide-num { color: rgba(255,255,255,0.4); }
  .green .text-area h2 { color: #fff; }
  .green .text-area .body { color: rgba(255,255,255,0.8); }
  .green .text-area .body strong { color: #fff; }
  .green .footer { color: rgba(255,255,255,0.35); }

  /* ── 하이라이트 박스 (heading 내) ── */
  .text-area h2 .acc {
    padding: 2px 10px 4px;
    border-radius: 4px;
    display: inline;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .dark .text-area h2 .acc {
    background: rgba(57,255,20,0.12);
  }
  .light .text-area h2 .acc {
    background: rgba(57,255,20,0.1);
  }
  .green .text-area h2 .acc {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
</style>
</head>
<body>
<div class="slide {{ variant }}">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="{{ video_path }}" type="video/mp4">
  </video>
  <div class="bg-grad"></div>
  <div class="side-bar"></div>

  <!-- 슬라이드 넘버 워터마크 -->
  <div class="slide-watermark">{{ slide_number }}</div>

  <!-- 태그 영역 -->
  <div class="tag-area">
    <span class="tag-pill">{{ tag }}</span>
    <span class="slide-num">{{ slide_number }} / {{ total_slides }}</span>
  </div>
  <div class="tag-divider"></div>

  <div class="mute"><svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg></div>
  <div class="text-area">
    <h2>{{ heading }}</h2>
    {{ body }}
  </div>
  <div class="footer">{{ footer }}</div>
</div>
</body>
</html>
