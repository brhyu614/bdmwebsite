<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDM Threads Factory</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  :root { --accent: #00FF88; --bg: #0a0a0a; --sidebar: #111; --card: #161616; --border: #222; --border-hover: #333; --text: #e0e0e0; --dim: #777; --muted: #555; --danger: #ff4466; --warn: #ffaa00; }
  * { margin:0; padding:0; box-sizing:border-box; word-break:keep-all; }
  body { font-family:'Pretendard',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* Layout */
  .app { display:grid; grid-template-columns:400px 1fr; min-height:100vh; }
  @media(max-width:900px) { .app { grid-template-columns:1fr; } .preview { border-left:none; border-top:1px solid var(--border); } }

  /* Sidebar */
  .sidebar { background:var(--sidebar); border-right:1px solid #1e1e1e; padding:20px; overflow-y:auto; max-height:100vh; }
  .logo { color:var(--accent); font-size:20px; font-weight:800; letter-spacing:2px; margin-bottom:2px; }
  .logo-sub { font-size:11px; color:var(--muted); margin-bottom:20px; }

  .section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin:18px 0 8px; }

  /* API Key */
  .api-row { display:flex; gap:6px; margin-bottom:10px; }
  .api-row label { font-size:10px; color:var(--muted); font-weight:600; min-width:52px; margin-top:9px; }
  .api-row input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--text); font-size:11px; font-family:inherit; outline:none; }
  .api-row input:focus { border-color:var(--accent); }
  .dot { width:10px; height:10px; border-radius:50%; margin-top:10px; flex-shrink:0; background:var(--border); }
  .dot.ok { background:var(--accent); }

  /* Source tabs */
  .source-tabs { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
  .source-tab { padding:10px; border:2px solid var(--border); border-radius:8px; background:var(--card); color:var(--dim);
    cursor:pointer; font-size:12px; font-weight:600; text-align:center; transition:all .15s; }
  .source-tab:hover { border-color:var(--border-hover); }
  .source-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(0,255,136,.04); }

  /* Article list */
  .article-list { max-height:280px; overflow-y:auto; margin-bottom:10px; }
  .article-item { padding:8px 10px; border:1px solid var(--border); border-radius:6px; margin-bottom:4px;
    cursor:pointer; font-size:12px; transition:all .15s; display:flex; justify-content:space-between; align-items:center; }
  .article-item:hover { border-color:#444; background:var(--card); }
  .article-item.selected { border-color:var(--accent); background:rgba(0,255,136,.04); }
  .article-item .date { color:var(--muted); font-size:10px; flex-shrink:0; margin-left:8px; }

  /* Fields */
  .field { margin-bottom:10px; }
  .field label { display:block; font-size:11px; font-weight:500; color:var(--muted); margin-bottom:4px; }
  .field textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; color:var(--text); font-size:13px; font-family:inherit; resize:vertical; outline:none; min-height:120px; line-height:1.7; }
  .field textarea:focus { border-color:var(--accent); }

  /* Image upload */
  .drop-zone { border:2px dashed var(--border); border-radius:10px; padding:16px; text-align:center;
    color:var(--muted); font-size:12px; cursor:pointer; transition:all .2s; margin-bottom:10px; }
  .drop-zone:hover, .drop-zone.drag { border-color:var(--accent); color:var(--accent); }
  .drop-zone input { display:none; }
  .image-preview { margin-bottom:10px; }
  .image-preview img { max-width:100%; max-height:120px; border-radius:8px; border:1px solid var(--border); }
  .image-preview .remove-img { background:var(--danger); color:#fff; border:none; border-radius:4px; padding:2px 8px; font-size:10px; cursor:pointer; margin-left:8px; vertical-align:top; }

  /* Buttons */
  .btn { width:100%; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:all .15s; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { background:#00cc6a; }
  .btn-primary:disabled { background:#333; color:#555; cursor:not-allowed; }
  .btn-secondary { background:var(--card); color:var(--text); border:1px solid var(--border); margin-top:6px; }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-sm { padding:8px 14px; font-size:12px; width:auto; border-radius:6px; }

  /* Learnings */
  .learnings { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-top:14px; }
  .learnings h4 { font-size:11px; color:var(--muted); margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .learnings .rule { font-size:11px; color:var(--dim); padding:4px 0; border-bottom:1px solid #1e1e1e; display:flex; justify-content:space-between; align-items:center; }
  .learnings .rule:last-child { border-bottom:none; }
  .learnings .rule .del-rule { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; }
  .learnings .rule .del-rule:hover { color:var(--danger); }
  .add-rule-row { display:flex; gap:4px; margin-top:6px; }
  .add-rule-row input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:5px 8px; color:var(--text); font-size:11px; font-family:inherit; outline:none; }
  .add-rule-row button { padding:5px 10px; background:var(--accent); color:#000; border:none; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }

  /* Status */
  .status { padding:10px 14px; border-radius:8px; font-size:12px; margin-bottom:10px; display:none; }
  .status.show { display:block; }
  .status.loading { background:rgba(0,255,136,.08); color:var(--accent); }
  .status.error { background:rgba(255,68,102,.1); color:var(--danger); }
  .status.success { background:rgba(0,255,136,.08); color:var(--accent); }

  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent);
    border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ═══ Preview ═══ */
  .preview { background:var(--bg); padding:24px; overflow-y:auto; max-height:100vh; }
  .preview-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .preview-header h2 { font-size:16px; font-weight:700; }

  /* Threads post card */
  .threads-card { background:#fff; border-radius:16px; padding:20px; margin-bottom:16px; color:#000; max-width:540px; cursor:pointer; border:3px solid transparent; transition:border-color .15s; }
  .threads-card:hover { border-color:#ddd; }
  .threads-card.selected { border-color:var(--accent); box-shadow:0 0 20px rgba(0,255,136,.15); }
  .threads-profile { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .threads-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#059669,#00FF88); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; color:#fff; flex-shrink:0; }
  .threads-name { font-weight:700; font-size:14px; }
  .threads-handle { font-size:12px; color:#999; }
  .threads-time { font-size:11px; color:#bbb; margin-left:auto; }
  .threads-text { font-size:15px; line-height:1.7; margin-bottom:12px; white-space:pre-wrap; color:#1a1a1a; }
  .threads-image { width:100%; border-radius:12px; margin-bottom:12px; max-height:300px; object-fit:cover; }
  .threads-hashtags { font-size:13px; color:#0095f6; margin-bottom:12px; }
  .threads-actions { display:flex; gap:20px; color:#999; font-size:13px; padding-top:10px; border-top:1px solid #eee; }
  .threads-actions span { cursor:pointer; }
  .threads-badge { display:inline-block; background:rgba(0,255,136,.15); color:var(--accent); padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; margin-bottom:8px; }
  .threads-img-keyword { font-size:11px; color:#999; margin-top:4px; }

  /* Review panel */
  .review-panel { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-top:16px; max-width:540px; }
  .review-panel h3 { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:12px; }
  .score-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
  .score-item { text-align:center; }
  .score-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .score-value { font-size:28px; font-weight:800; }
  .score-value.high { color:var(--accent); }
  .score-value.mid { color:var(--warn); }
  .score-value.low { color:var(--danger); }
  .total-score { text-align:center; padding:12px; background:var(--bg); border-radius:8px; margin-bottom:12px; }
  .total-score .big { font-size:36px; font-weight:800; color:var(--accent); }
  .total-score .of { font-size:14px; color:var(--muted); }
  .review-feedback { font-size:13px; color:var(--dim); line-height:1.7; padding:10px; background:var(--bg); border-radius:8px; }
  .best-badge { display:inline-block; background:var(--accent); color:#000; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; margin-bottom:8px; }

  /* Feedback area */
  .feedback-area { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-top:16px; max-width:540px; }
  .feedback-area h3 { font-size:13px; font-weight:700; margin-bottom:8px; }
  .feedback-area textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; color:var(--text); font-size:13px; font-family:inherit; resize:vertical; outline:none; min-height:60px; }
  .feedback-area textarea:focus { border-color:var(--accent); }
  .feedback-actions { display:flex; gap:8px; margin-top:10px; }

  /* Copy button */
  .copy-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:var(--card); color:var(--text);
    border:1px solid var(--border); border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit; }
  .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
  .copy-btn.copied { border-color:var(--accent); color:var(--accent); background:rgba(0,255,136,.08); }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:13px; line-height:1.8; }

  .hidden { display:none !important; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; display:flex; align-items:center; justify-content:center; }
  .modal-overlay.hidden { display:none; }
  .modal { background:var(--sidebar); border:1px solid var(--border); border-radius:16px; width:90vw; max-width:800px; max-height:85vh; display:flex; flex-direction:column; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
  .modal-header h2 { font-size:16px; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px 8px; }
  .modal-close:hover { color:var(--text); }
  .modal-body { flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
  .modal-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); }
  .modal-tab { padding:10px 16px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer;
    background:none; border:none; border-bottom:2px solid transparent; font-family:inherit; transition:all .15s; }
  .modal-tab:hover { color:var(--text); }
  .modal-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .modal-editor { flex:1; padding:16px; display:flex; flex-direction:column; overflow:hidden; }
  .modal-editor textarea { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px;
    color:var(--text); font-size:12px; font-family:'Pretendard',monospace; line-height:1.7; resize:none; outline:none; min-height:300px; }
  .modal-editor textarea:focus { border-color:var(--accent); }
  .modal-footer { display:flex; gap:8px; justify-content:flex-end; padding:12px 20px; border-top:1px solid var(--border); }
</style>
</head>
<body>
<div class="app">

<!-- ═══ SIDEBAR ═══ -->
<div class="sidebar">
  <div class="logo">BDM THREADS</div>
  <div class="logo-sub">Threads Post Generator</div>

  <!-- API Key -->
  <div class="section-title">API KEY</div>
  <div class="api-row">
    <label>Gemini</label>
    <input type="password" id="geminiKey" placeholder="AIza..." />
    <div class="dot" id="geminiDot"></div>
  </div>

  <!-- Content Source -->
  <div class="section-title">CONTENT SOURCE</div>
  <div class="source-tabs">
    <div class="source-tab active" data-source="article" onclick="switchSource('article')">아티클 선택</div>
    <div class="source-tab" data-source="text" onclick="switchSource('text')">직접 입력</div>
  </div>

  <div id="articlePanel">
    <div class="article-list" id="articleList"></div>
  </div>

  <div id="textPanel" class="hidden">
    <div class="field">
      <label>콘텐츠 내용 (제목 + 핵심 내용)</label>
      <textarea id="directInput" placeholder="Threads에 올리고 싶은 내용을 입력하세요. 아티클 제목과 핵심 데이터/인사이트를 포함하면 좋습니다."></textarea>
    </div>
  </div>

  <!-- Image -->
  <div class="section-title">IMAGE (OPTIONAL)</div>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    이미지 드래그 앤 드롭 또는 클릭
    <input type="file" id="fileInput" accept="image/*" />
  </div>
  <div class="image-preview" id="imagePreview"></div>

  <!-- Status -->
  <div class="status" id="status"></div>

  <!-- Generate -->
  <button class="btn btn-primary" id="generateBtn" onclick="generate()">Threads 포스트 생성</button>
  <button class="btn btn-secondary" onclick="openPromptEditor()">프롬프트 설정</button>

  <!-- Learnings -->
  <div class="learnings">
    <h4>학습 규칙 <span style="font-size:9px;color:var(--muted)" id="ruleCount">0</span></h4>
    <div id="rulesList"></div>
    <div class="add-rule-row">
      <input type="text" id="newRuleInput" placeholder="새 규칙 추가..." onkeydown="if(event.key==='Enter')addRule()" />
      <button onclick="addRule()">+</button>
    </div>
  </div>
</div>

<!-- ═══ PREVIEW ═══ -->
<div class="preview">
  <div class="preview-header">
    <h2>Preview</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="copy-btn hidden" id="copyBtn" onclick="copySelected()">텍스트 복사</button>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="icon">🧵</div>
    <p>아티클을 선택하거나 내용을 입력하고<br />"Threads 포스트 생성" 버튼을 누르세요.</p>
  </div>

  <!-- Variations -->
  <div id="variationsArea" class="hidden"></div>

  <!-- Review -->
  <div id="reviewArea" class="hidden"></div>

  <!-- Feedback -->
  <div id="feedbackArea" class="hidden">
    <div class="feedback-area">
      <h3>피드백 / 수정 요청</h3>
      <textarea id="feedbackText" placeholder="수정하고 싶은 점을 입력하세요..."></textarea>
      <div class="feedback-actions">
        <button class="btn btn-primary btn-sm" onclick="regenerate()">재생성</button>
        <button class="btn btn-secondary btn-sm" style="background:rgba(0,255,136,.1);color:var(--accent);border-color:var(--accent)" onclick="approve()">승인</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══ PROMPT EDITOR MODAL ═══ -->
<div class="modal-overlay hidden" id="promptModal">
  <div class="modal">
    <div class="modal-header">
      <h2>프롬프트 설정</h2>
      <button class="modal-close" onclick="closePromptEditor()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" data-prompt="generate" onclick="switchPromptTab('generate',this)">생성 프롬프트</button>
        <button class="modal-tab" data-prompt="review" onclick="switchPromptTab('review',this)">리뷰 프롬프트</button>
      </div>
      <div class="modal-editor">
        <textarea id="promptEditor" spellcheck="false"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="resetCurrentPrompt()">기본값 복원</button>
      <button class="btn btn-primary btn-sm" onclick="closePromptEditor()">닫기</button>
    </div>
  </div>
</div>

const DEFAULT_PROMPTS = {
  generate: `당신은 BDM Lab의 Threads(Meta) 콘텐츠 전략가입니다.

## 사실 준수 원칙 (최우선 규칙)

function getGeminiKey() {
  const key = document.getElementById('geminiKey').value.trim();
  return key || DEFAULT_GEMINI_KEY;
}

async function callGemini(systemPrompt, userMessage) {
  const geminiKey = getGeminiKey();
  if (!geminiKey) throw new Error('Gemini API Key를 입력하세요');

  const prompt = systemPrompt + '\n\n' + userMessage;

  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 4096 },
    }),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `Gemini API Error ${resp.status}`);
  }
  const data = await resp.json();
  return data.candidates[0].content.parts[0].text.trim();
}

async function callClaude(systemPrompt, userMessage) {
  const claudeKey = DEFAULT_CLAUDE_KEY;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': claudeKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      system: systemPrompt + '\n\nYou must respond with valid JSON only, no other text.',
      messages: [{ role: 'user', content: userMessage }]
    })
  });
  if (!resp.ok) throw new Error(`Claude API error: ${resp.status}`);
  const data = await resp.json();
  let text = data.content[0].text.trim();
  const m = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (m) text = m[1].trim();
  return JSON.parse(text);
}

function extractJSON(text) {
  // Try to find JSON in response
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (jsonMatch) {
    try { return JSON.parse(jsonMatch[0]); } catch(e) {}
  }
  // Try cleaning markdown code blocks
  const cleaned = text.replace(/```json?\s*/g, '').replace(/```/g, '').trim();
  const jsonMatch2 = cleaned.match(/\{[\s\S]*\}/);
  if (jsonMatch2) {
    try { return JSON.parse(jsonMatch2[0]); } catch(e) {}
  }
  throw new Error('JSON 파싱 실패');
}

async function generate() {
  // Get content
  const isArticle = document.querySelector('.source-tab.active').dataset.source === 'article';
  let content = '';
  if (isArticle) {
    if (!state.selectedArticle) { setStatus('error', '아티클을 선택하세요'); return; }
    content = `아티클 제목: ${state.selectedArticle.title}\n슬러그: ${state.selectedArticle.slug}`;
  } else {
    content = document.getElementById('directInput').value.trim();
    if (!content) { setStatus('error', '내용을 입력하세요'); return; }
  }

  // Add learnings
  let rulesText = '';
  if (learnings.rules.length > 0) {
    rulesText = '\n\n## 추가 규칙 (반드시 따르세요)\n' + learnings.rules.map((r,i) => `${i+1}. ${r}`).join('\n');
  }

  const systemPrompt = prompts.generate + rulesText;
  const userMessage = `다음 콘텐츠를 Threads 포스트 3개 변형으로 만들어주세요.\n\n${content}\n\nJSON으로만 답하세요.`;

  // UI
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('generateBtn').textContent = '생성 중...';
  setStatus('loading', 'Claude로 Threads 포스트 생성 중...');
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('variationsArea').classList.add('hidden');
  document.getElementById('reviewArea').classList.add('hidden');
  document.getElementById('feedbackArea').classList.add('hidden');
  document.getElementById('copyBtn').classList.add('hidden');
  state.variations = [];
  state.review = null;
  state.approved = false;

  try {
    // Step 1: Generate with Claude
    const result = await callClaude(systemPrompt, userMessage);

    if (!result.variations || !Array.isArray(result.variations)) {
      throw new Error('응답에 variations 배열이 없습니다');
    }

    state.variations = result.variations;
    state.selectedVariation = 0;
    renderVariations();

    // Step 2: Review with Gemini (self-review)
    setStatus('loading', 'Gemini로 자동 리뷰 중...');
    try {
      const reviewUserMsg = state.variations.map((v, i) =>
        `[변형 ${i+1}]\n${v.text}\n${v.hashtags || ''}`
      ).join('\n\n');

      const reviewRaw = await callGemini(prompts.review, reviewUserMsg);
      state.review = extractJSON(reviewRaw);
      renderReview();
    } catch (reviewErr) {
      console.warn('Gemini review skipped (quota or error):', reviewErr);
      // Review is optional — if Gemini fails, skip gracefully
    }

    setStatus('success', '생성 완료! 변형을 선택하고 복사하세요.');
    document.getElementById('feedbackArea').classList.remove('hidden');
    document.getElementById('copyBtn').classList.remove('hidden');

  } catch (err) {
    setStatus('error', '오류: ' + err.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('generateBtn').textContent = 'Threads 포스트 생성';
  }
}

async function regenerate() {
  const feedback = document.getElementById('feedbackText').value.trim();
  if (feedback) {
    // Add feedback as temporary context
    const origContent = document.querySelector('.source-tab.active').dataset.source === 'article'
      ? (state.selectedArticle ? state.selectedArticle.title : '')
      : document.getElementById('directInput').value.trim();

    // Modify the user message to include feedback
    const prevText = state.variations.map((v,i) => `변형${i+1}: ${v.text}`).join('\n');
    const systemPrompt = prompts.generate +
      (learnings.rules.length > 0 ? '\n\n## 추가 규칙\n' + learnings.rules.map((r,i) => `${i+1}. ${r}`).join('\n') : '');

    const userMessage = `이전 생성 결과:\n${prevText}\n\n피드백: ${feedback}\n\n원본 콘텐츠: ${origContent}\n\n피드백을 반영해서 다시 3개 변형을 만들어주세요. JSON으로만 답하세요.`;

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('generateBtn').textContent = '재생성 중...';
    setStatus('loading', 'Claude로 피드백 반영하여 재생성 중...');

    try {
      const result = await callClaude(systemPrompt, userMessage);
      if (result.variations) {
        state.variations = result.variations;
        state.selectedVariation = 0;
        state.review = null;
        renderVariations();
        document.getElementById('reviewArea').classList.add('hidden');

        // Re-review with Gemini
        setStatus('loading', 'Gemini로 자동 리뷰 중...');
        try {
          const reviewUserMsg = state.variations.map((v, i) =>
            `[변형 ${i+1}]\n${v.text}\n${v.hashtags || ''}`
          ).join('\n\n');
          const reviewRaw = await callGemini(prompts.review, reviewUserMsg);
          state.review = extractJSON(reviewRaw);
          renderReview();
        } catch(e) { console.warn('Gemini review skipped (quota or error):', e); }

        setStatus('success', '재생성 완료!');
        document.getElementById('feedbackText').value = '';
      }
    } catch(err) {
      setStatus('error', '오류: ' + err.message);
    } finally {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('generateBtn').textContent = 'Threads 포스트 생성';
    }
  } else {
    // No feedback, just regenerate
    generate();
  }
}

async function copySelected() {
  const v = state.variations[state.selectedVariation];
  if (!v) return;
  const text = v.text + '\n\n' + (v.hashtags || '');
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '복사됨!';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '텍스트 복사'; }, 2000);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '복사됨!';
    setTimeout(() => { btn.textContent = '텍스트 복사'; }, 2000);
  }
}

// ═══════════════════════════════════════
function openPromptEditor() {
  document.getElementById('promptModal').classList.remove('hidden');
  currentPromptTab = 'generate';
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.prompt === 'generate'));
  document.getElementById('promptEditor').value = prompts.generate;
}

function closePromptEditor() {
  // Save current
  prompts[currentPromptTab] = document.getElementById('promptEditor').value;
  localStorage.setItem('bdm_threads_prompt_' + currentPromptTab, prompts[currentPromptTab]);
  document.getElementById('promptModal').classList.add('hidden');
}

function switchPromptTab(tab, btn) {
  // Save current before switching
  prompts[currentPromptTab] = document.getElementById('promptEditor').value;
  localStorage.setItem('bdm_threads_prompt_' + currentPromptTab, prompts[currentPromptTab]);

  currentPromptTab = tab;
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.prompt === tab));
  document.getElementById('promptEditor').value = prompts[tab];
}

function resetCurrentPrompt() {
  if (confirm('이 프롬프트를 기본값으로 복원하시겠습니까?')) {
    prompts[currentPromptTab] = DEFAULT_PROMPTS[currentPromptTab];
    localStorage.setItem('bdm_threads_prompt_' + currentPromptTab, prompts[currentPromptTab]);
    document.getElementById('promptEditor').value = prompts[currentPromptTab];
  }
}
</script>
</body>
