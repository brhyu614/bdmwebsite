<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDM Carousel Generator</title>
<style>
  @font-face { font-family: 'Pretendard'; src: url('/Users/jeongseongyeong/Library/Fonts/Pretendard-Regular.ttf'); font-weight: 400; }
  @font-face { font-family: 'Pretendard'; src: url('/Users/jeongseongyeong/Library/Fonts/Pretendard-Medium.ttf'); font-weight: 500; }
  @font-face { font-family: 'Pretendard'; src: url('/Users/jeongseongyeong/Library/Fonts/Pretendard-SemiBold.ttf'); font-weight: 600; }
  @font-face { font-family: 'Pretendard'; src: url('/Users/jeongseongyeong/Library/Fonts/Pretendard-Bold.ttf'); font-weight: 700; }
  @font-face { font-family: 'Pretendard'; src: url('/Users/jeongseongyeong/Library/Fonts/Pretendard-ExtraBold.ttf'); font-weight: 800; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;600;700;900&display=swap');

  :root { --accent: #00FF88; }
  * { margin:0; padding:0; box-sizing:border-box; word-break:keep-all; }
  body { font-family:'Pretendard','Inter','Noto Sans KR',-apple-system,sans-serif; background:#0a0a0a; color:#e0e0e0; min-height:100vh; }
  .app { display:grid; grid-template-columns:400px 1fr; min-height:100vh; }

  /* ── Sidebar ── */
  .sidebar { background:#111; border-right:1px solid #1e1e1e; padding:24px; overflow-y:auto; max-height:100vh; }
  .sidebar-header { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
  .sidebar-header .logo { color:var(--accent); font-size:22px; font-weight:800; letter-spacing:2px; }
  .sidebar-header .sub { font-size:12px; color:#555; font-weight:500; }

  /* API Key */
  .api-key-bar { display:flex; gap:6px; margin-bottom:20px; }
  .api-key-bar input { flex:1; background:#161616; border:1px solid #222; border-radius:8px; padding:8px 10px; color:#e0e0e0; font-size:12px; font-family:inherit; outline:none; }
  .api-key-bar input:focus { border-color:var(--accent); }
  .api-key-bar .status-dot { width:10px; height:10px; border-radius:50%; margin-top:10px; flex-shrink:0; }
  .api-key-bar .status-dot.ok { background:var(--accent); }
  .api-key-bar .status-dot.no { background:#ff4444; }
  .api-key-bar .status-dot.idle { background:#333; }

  .section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:#555; margin:20px 0 8px; }

  /* Variant */
  .variant-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:10px; }
  .variant-btn { border:2px solid #222; border-radius:7px; padding:8px 4px; background:#161616; color:#777; cursor:pointer; font-size:10px; font-weight:600; text-align:center; transition:all .15s; }
  .variant-btn:hover { border-color:#333; }
  .variant-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,255,136,.04); }
  .variant-btn .vdot { width:22px; height:14px; border-radius:3px; margin:0 auto 3px; border:1px solid #333; }

  /* Slides */
  .slide-list { display:flex; flex-direction:column; gap:3px; margin-bottom:8px; }
  .slide-item { display:flex; align-items:center; gap:6px; padding:9px 10px; background:#161616; border-radius:7px; cursor:pointer; border:2px solid transparent; transition:all .12s; }
  .slide-item:hover { background:#1a1a1a; }
  .slide-item.active { border-color:var(--accent); background:rgba(0,255,136,.03); }
  .slide-item .num { font-size:10px; font-weight:700; color:var(--accent); min-width:16px; opacity:.5; }
  .slide-item .label { flex:1; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#999; }
  .slide-item .badges { display:flex; gap:3px; align-items:center; }
  .slide-item .badge { font-size:8px; font-weight:600; padding:2px 5px; border-radius:3px; text-transform:uppercase; }
  .slide-item .badge-v { color:#555; background:#1e1e1e; }
  .slide-item .badge-vid { color:var(--accent); background:rgba(0,255,136,.08); }
  .slide-item .delete-btn { background:none; border:none; color:#333; cursor:pointer; font-size:15px; padding:0 2px; }
  .slide-item .delete-btn:hover { color:#ff4444; }

  .add-slide-btn { width:100%; padding:9px; border:1px dashed #2a2a2a; border-radius:7px; background:transparent; color:#555; cursor:pointer; font-size:11px; font-weight:500; transition:all .2s; }
  .add-slide-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* Fields */
  .edit-area { margin-top:10px; display:flex; flex-direction:column; gap:8px; }
  .field label { display:block; font-size:11px; font-weight:500; color:#555; margin-bottom:3px; }
  .field textarea, .field input[type="text"], .field select { width:100%; background:#161616; border:1px solid #222; border-radius:7px; padding:9px 10px; color:#e0e0e0; font-size:13px; font-family:inherit; resize:vertical; outline:none; transition:border-color .2s; }
  .field textarea:focus, .field input[type="text"]:focus { border-color:var(--accent); }
  .field textarea { min-height:60px; }
  .syntax-hint { font-size:9px; color:#3a3a3a; margin-top:2px; }

  /* Video search area */
  .video-search-area { background:#0e0e0e; border:1px solid #1e1e1e; border-radius:10px; padding:12px; }
  .video-search-row { display:flex; gap:6px; margin-bottom:8px; }
  .video-search-row input { flex:1; background:#161616; border:1px solid #222; border-radius:6px; padding:7px 9px; color:#e0e0e0; font-size:12px; font-family:inherit; outline:none; }
  .video-search-row input:focus { border-color:var(--accent); }
  .icon-btn { width:32px; height:32px; border-radius:6px; border:1px solid #222; background:#161616; color:#888; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
  .icon-btn:hover { border-color:var(--accent); color:var(--accent); }
  .icon-btn.loading { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .video-thumbs { display:flex; gap:4px; overflow-x:auto; padding-bottom:4px; }
  .video-thumb { width:56px; height:70px; border-radius:5px; overflow:hidden; cursor:pointer; border:2px solid transparent; flex-shrink:0; position:relative; transition:border-color .15s; }
  .video-thumb:hover { border-color:#444; }
  .video-thumb.active { border-color:var(--accent); }
  .video-thumb video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .video-thumb .dur { position:absolute; bottom:2px; right:2px; font-size:8px; background:rgba(0,0,0,.7); color:#ccc; padding:1px 3px; border-radius:2px; }

  .video-status { font-size:10px; color:#444; margin-top:4px; min-height:14px; }
  .video-status.error { color:#ff6666; }

  .or-divider { text-align:center; font-size:10px; color:#333; margin:6px 0; }

  .manual-upload-btn { width:100%; padding:7px; border:1px dashed #222; border-radius:6px; background:transparent; color:#444; cursor:pointer; font-size:11px; position:relative; transition:all .15s; }
  .manual-upload-btn:hover { border-color:#444; color:#888; }
  .manual-upload-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; }

  /* Gradient */
  .grad-select { display:grid; grid-template-columns:repeat(2,1fr); gap:4px; }
  .grad-btn { padding:5px; border:1px solid #222; border-radius:5px; background:#161616; color:#555; cursor:pointer; font-size:9px; font-weight:600; text-align:center; transition:all .12s; }
  .grad-btn:hover { border-color:#333; }
  .grad-btn.active { border-color:var(--accent); color:var(--accent); }

  .deco-select { display:flex; gap:4px; }
  .deco-btn { flex:1; padding:5px; border:1px solid #222; border-radius:5px; background:#161616; color:#555; cursor:pointer; font-size:9px; font-weight:600; text-align:center; transition:all .12s; }
  .deco-btn:hover { border-color:#333; }
  .deco-btn.active { border-color:var(--accent); color:var(--accent); }

  .toggle-row { display:flex; align-items:center; gap:7px; margin-top:3px; }
  .toggle-row input[type="checkbox"] { accent-color:var(--accent); width:14px; height:14px; }
  .toggle-row label { font-size:11px; color:#777; cursor:pointer; }

  .btn-primary { width:100%; padding:13px; background:var(--accent); color:#0a0a0a; border:none; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; transition:filter .2s; margin-top:6px; }
  .btn-primary:hover { filter:brightness(1.1); }
  .btn-secondary { width:100%; padding:10px; background:#161616; color:#777; border:1px solid #222; border-radius:9px; font-size:12px; font-weight:500; cursor:pointer; transition:all .2s; }
  .btn-secondary:hover { background:#1e1e1e; color:#ccc; }
  .export-row { display:flex; gap:6px; align-items:center; margin-top:5px; }
  .export-row label { font-size:10px; color:#555; min-width:50px; }
  .export-row input { flex:1; background:#161616; border:1px solid #222; border-radius:5px; padding:5px 7px; color:#e0e0e0; font-size:11px; font-family:inherit; outline:none; width:60px; }
  .btn-stop { width:100%; padding:10px; background:#dc3545; color:#fff; border:none; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; margin-top:5px; }
  .btn-stop:hover { background:#c82333; }
  .download-progress { margin-top:6px; font-size:11px; color:#555; text-align:center; min-height:16px; }

  /* ── Preview ── */
  .preview-area { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; overflow-y:auto; background:#0a0a0a; }
  .preview-nav { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .preview-nav button { width:38px; height:38px; border-radius:50%; border:1px solid #222; background:#111; color:#777; font-size:17px; cursor:pointer; transition:all .15s; }
  .preview-nav button:hover { border-color:var(--accent); color:var(--accent); }
  .preview-nav .page-info { font-size:12px; color:#444; font-weight:600; letter-spacing:1px; }
  .slide-canvas { width:432px; height:540px; border-radius:10px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.6); position:relative; background:#0a0a0a; }
  .preview-dots { display:flex; gap:5px; margin-top:14px; }
  .preview-dots .dot { width:7px; height:7px; border-radius:50%; background:#1e1e1e; cursor:pointer; transition:all .2s; }
  .preview-dots .dot.active { background:var(--accent); width:22px; border-radius:4px; }

  /* ── Slide internals ── */
  .slide-inner { width:100%; height:100%; position:relative; overflow:hidden; font-family:'Pretendard',-apple-system,sans-serif; }
  .slide-inner .bg-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  .slide-inner .bg-grad { position:absolute; inset:0; z-index:1; }
  .slide-inner .top-bar { position:absolute; top:0; left:0; right:0; z-index:10; }
  .slide-inner .cat-tag { position:absolute; z-index:10; font-weight:600; text-transform:uppercase; }
  .slide-inner .mute-icon { position:absolute; z-index:10; border-radius:50%; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; }
  .slide-inner .mute-icon svg { fill:rgba(255,255,255,.7); }
  .slide-inner .sci-grid, .slide-inner .sci-dots { position:absolute; inset:0; z-index:2; }
  .slide-inner .corner-tl, .slide-inner .corner-br { position:absolute; z-index:3; }
  .slide-inner .corner-tl { border-top:2px solid; border-left:2px solid; }
  .slide-inner .corner-br { border-bottom:2px solid; border-right:2px solid; }
  .slide-inner .text-area { position:absolute; bottom:0; left:0; right:0; z-index:5; }
  .slide-inner .text-area h2 { font-weight:800; line-height:1.35; }
  .slide-inner .text-area .body-text { font-weight:400; line-height:1.85; }
  .slide-inner .slide-footer { position:absolute; left:0; right:0; text-align:center; font-weight:500; font-style:italic; z-index:10; }

  .scheme-dark { background:#0A0A0A; }
  .scheme-dark .cat-tag { color:rgba(255,255,255,.4); }
  .scheme-dark h2 { color:#fff; }
  .scheme-dark .acc { color:var(--accent); }
  .scheme-dark .body-text { color:rgba(255,255,255,.5); }
  .scheme-dark .body-text strong { color:#fff; }
  .scheme-dark .hl { color:var(--accent); font-weight:700; }
  .scheme-dark .slide-footer { color:rgba(255,255,255,.15); }

  .scheme-light { background:#FAFAFA; }
  .scheme-light .cat-tag { color:rgba(30,30,30,.35); }
  .scheme-light h2 { color:#1A1A1A; }
  .scheme-light .acc { color:var(--accent); }
  .scheme-light .body-text { color:rgba(30,30,30,.45); }
  .scheme-light .body-text strong { color:#1A1A1A; }
  .scheme-light .hl { color:var(--accent); font-weight:700; }
  .scheme-light .slide-footer { color:rgba(30,30,30,.15); }

  .scheme-green { background:var(--accent); }
  .scheme-green .top-bar { background:#fff!important; }
  .scheme-green .cat-tag { color:rgba(255,255,255,.6); border-color:#fff!important; }
  .scheme-green h2 { color:#fff; }
  .scheme-green .body-text { color:rgba(255,255,255,.75); }
  .scheme-green .body-text strong { color:#fff; }
  .scheme-green .slide-footer { color:rgba(255,255,255,.3); }

  .scheme-sci-dark { background:linear-gradient(135deg,#0A0A0A 0%,#001a0d 40%,#0A0A0A 100%); }
  .scheme-sci-dark .cat-tag { color:rgba(255,255,255,.4); }
  .scheme-sci-dark h2 { color:#fff; }
  .scheme-sci-dark .acc { color:var(--accent); }
  .scheme-sci-dark .body-text { color:rgba(255,255,255,.5); }
  .scheme-sci-dark .body-text strong { color:#fff; }
  .scheme-sci-dark .hl { color:var(--accent); font-weight:700; }
  .scheme-sci-dark .slide-footer { color:rgba(255,255,255,.15); }

  .scheme-navy { background:linear-gradient(180deg,#080e1a,#0f1d35 50%,#0a1428); }
  .scheme-navy .cat-tag { color:rgba(255,255,255,.35); }
  .scheme-navy h2 { color:#fff; }
  .scheme-navy .acc { color:var(--accent); }
  .scheme-navy .body-text { color:rgba(255,255,255,.45); }
  .scheme-navy .body-text strong { color:#e0e0e0; }
  .scheme-navy .hl { color:var(--accent); font-weight:700; }
  .scheme-navy .slide-footer { color:rgba(255,255,255,.12); }

  .scheme-warm { background:linear-gradient(160deg,#0A0A0A,#1a1008 50%,#0A0A0A); }
  .scheme-warm .cat-tag { color:rgba(255,255,255,.35); }
  .scheme-warm h2 { color:#fff; }
  .scheme-warm .acc { color:var(--accent); }
  .scheme-warm .body-text { color:rgba(255,255,255,.45); }
  .scheme-warm .body-text strong { color:#fff; }
  .scheme-warm .hl { color:var(--accent); font-weight:700; }
  .scheme-warm .slide-footer { color:rgba(255,255,255,.12); }

  @media (max-width:960px) { .app{grid-template-columns:1fr;} .preview-area{padding:20px;} .slide-canvas{width:300px;height:375px;} }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="logo">BDM</span>
      <span class="sub">Carousel Generator</span>
    </div>

    <div class="field" style="margin-bottom:4px">
      <label>Pexels API Key <a href="https://www.pexels.com/api/" target="_blank" style="color:var(--accent);text-decoration:none;font-size:10px">(Get free key)</a></label>
      <div class="api-key-bar">
        <input type="password" id="apiKeyInput" placeholder="Paste your Pexels API key..." oninput="saveApiKey(this.value)">
        <div class="status-dot idle" id="apiDot"></div>
      </div>
    </div>

    <div class="section-title">Slides</div>
    <div class="slide-list" id="slideList"></div>
    <button class="add-slide-btn" onclick="addSlide()">+ Add Slide</button>

    <div class="edit-area" id="editArea"></div>

    <div class="section-title">Global</div>
    <div class="field"><label>Footer</label><input type="text" id="footerText" value="BDM Lab · @bdm.lab" oninput="render()"></div>
    <div class="toggle-row"><input type="checkbox" id="showTopBar" checked onchange="render()"><label for="showTopBar">Top bar</label></div>
    <div class="toggle-row"><input type="checkbox" id="showCorners" checked onchange="render()"><label for="showCorners">Corners</label></div>
    <div class="toggle-row"><input type="checkbox" id="showMute" checked onchange="render()"><label for="showMute">Mute icon</label></div>

    <div class="section-title">Export</div>
    <div class="export-row"><label>Duration</label><input type="number" id="videoDuration" value="8" min="3" max="30"> sec</div>
    <button class="btn-primary" onclick="downloadAllVideos()">Export All Video (WebM)</button>
    <button class="btn-secondary" style="margin-top:5px" onclick="downloadCurrentVideo()">Export Current Video</button>
    <button class="btn-secondary" style="margin-top:5px" onclick="downloadCurrentPNG()">Export Current PNG</button>
    <button class="btn-stop" id="stopExportBtn" style="display:none" onclick="stopExport()">Stop Export</button>
    <div class="download-progress" id="downloadProgress"></div>
  </div>

  <div class="preview-area">
    <div class="preview-nav">
      <button onclick="prevSlide()">&#8249;</button>
      <span class="page-info" id="pageInfo">1/1</span>
      <button onclick="nextSlide()">&#8250;</button>
    </div>
    <div class="slide-canvas" id="previewCanvas"></div>
    <div class="preview-dots" id="previewDots"></div>
  </div>
</div>

<canvas id="exportCanvas" width="1080" height="1350" style="position:fixed;left:-9999px;top:-9999px;"></canvas>

<script>
// ── Config ──
const W=1080, H=1350, PW=432, PH=540, SC=PW/W, ACCENT='#00FF88';

const VARIANTS=[
  {id:'dark',name:'Dark',dot:'#0A0A0A'},{id:'light',name:'Light',dot:'#FAFAFA'},
  {id:'green',name:'Green',dot:ACCENT},{id:'sci-dark',name:'Sci-Dark',dot:'linear-gradient(135deg,#0A0A0A,#001a0d)'},
  {id:'navy',name:'Navy',dot:'linear-gradient(180deg,#080e1a,#0f1d35)'},
  {id:'warm',name:'Warm',dot:'linear-gradient(160deg,#0A0A0A,#1a1008)'}
];
const GRADS=[
  {id:'bottom-dark',name:'Btm Dark'},{id:'bottom-light',name:'Btm Light'},
  {id:'bottom-green',name:'Btm Green'},{id:'full-dark',name:'Full Dark'}
];
const DECOS=[{id:'none',name:'None'},{id:'grid',name:'Grid'},{id:'dots',name:'Dots'}];

// ── State ──
let apiKey = localStorage.getItem('pexels_api_key')||'';
const videoCache = {};
let searchTimers = {};

let state = {
  cur: 0,
  slides: [
    mkSlide('sci-dark','grid','bottom-dark','DBR 432호 기고','제목을\n입력하세요','부제목 또는 한줄 설명을\n여기에 작성하세요.',true,''),
    mkSlide('dark','dots','bottom-dark','HOOK','핵심 질문이나\n문제를 제기하세요','본문 텍스트를 작성합니다.\n**강조 텍스트**는 볼드 처리됩니다.\n{{하이라이트}}는 초록색으로 표시됩니다.',false,''),
    mkSlide('light','grid','bottom-light','INSIGHT','핵심 {{인사이트}}를\n전달하세요','밝은 배경의 슬라이드로\n시각적 변화를 줄 수 있습니다.',false,''),
    mkSlide('green','none','bottom-green','KEY POINT','가장 강조하고 싶은\n메시지를 넣으세요','초록 배경은 강렬한 인상을 남깁니다.',false,''),
    mkSlide('dark','dots','bottom-dark','INSIGHT','추가 **인사이트**를\n전달합니다','**볼드**와 {{하이라이트}}를\n조합해 가독성을 높이세요.',false,''),
    mkSlide('dark','none','bottom-dark','CTA','BDM','AI 마케팅에서\n무슨 일이 벌어지는지 궁금하다면?\n\ndbr.donga.com\nbigdatamarketinglab.com',false,''),
  ]
};

function mkSlide(v,d,g,tag,title,body,cover,kw) {
  return {variant:v,deco:d,grad:g,tag,title,body,iscover:cover,keyword:kw,videoUrl:null,videoFile:null,pexelResults:[],pexelIdx:0,searching:false,hookNumber:'',hookLabel:''};
}

// ── API Key ──
function saveApiKey(v) {
  apiKey = v.trim();
  localStorage.setItem('pexels_api_key', apiKey);
  const dot = document.getElementById('apiDot');
  dot.className = 'status-dot ' + (apiKey ? 'ok' : 'idle');
}

// ── Pexels API ──
async function searchPexels(query) {
  if (!apiKey || !query) return [];
  const cacheKey = query.toLowerCase().trim();
  if (videoCache[cacheKey]) return videoCache[cacheKey];

  const url = `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&orientation=portrait&per_page=10&size=medium`;
  try {
    const res = await fetch(url, { headers: { 'Authorization': apiKey } });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const results = (data.videos||[]).map(v => {
      const hd = v.video_files.find(f => f.quality==='hd' && f.file_type==='video/mp4');
      const sd = v.video_files.find(f => f.quality==='sd' && f.file_type==='video/mp4');
      const file = hd || sd || v.video_files[0];
      return { id:v.id, url:file?.link, thumb: v.image, duration: v.duration, w:file?.width, h:file?.height };
    }).filter(r => r.url);
    videoCache[cacheKey] = results;
    return results;
  } catch(e) {
    console.error('Pexels error:', e);
    return [];
  }
}

function extractKeyword(s) {
  let text = (s.title + ' ' + s.tag).replace(/\*\*/g,'').replace(/\{\{|\}\}/g,'').replace(/\n/g,' ');
  // Remove common filler
  text = text.replace(/['"(){}[\]<>]/g,'').replace(/\s+/g,' ').trim();
  // Take first meaningful chunk
  const words = text.split(' ').filter(w => w.length > 1).slice(0,3);
  return words.join(' ');
}

async function autoSearchForSlide(slideIdx) {
  const s = state.slides[slideIdx];
  if (!apiKey) return;

  const kw = s.keyword || extractKeyword(s);
  if (!kw) return;

  s.searching = true;
  if (slideIdx === state.cur) renderEditArea();

  const results = await searchPexels(kw);
  s.pexelResults = results;
  s.pexelIdx = 0;
  s.searching = false;

  if (results.length > 0) {
    s.videoUrl = results[0].url;
    s.videoFile = null;
  }

  if (slideIdx === state.cur) { renderEditArea(); render(); }
  renderSlideList();
}

function debouncedSearch(slideIdx) {
  clearTimeout(searchTimers[slideIdx]);
  searchTimers[slideIdx] = setTimeout(() => autoSearchForSlide(slideIdx), 800);
}

function selectPexelVideo(idx) {
  const s = state.slides[state.cur];
  if (!s.pexelResults[idx]) return;
  s.pexelIdx = idx;
  s.videoUrl = s.pexelResults[idx].url;
  s.videoFile = null;
  renderEditArea(); render(); renderSlideList();
}

function refreshVideo() {
  const s = state.slides[state.cur];
  if (s.pexelResults.length <= 1) { autoSearchForSlide(state.cur); return; }
  s.pexelIdx = (s.pexelIdx + 1) % s.pexelResults.length;
  s.videoUrl = s.pexelResults[s.pexelIdx].url;
  renderEditArea(); render();
}

function removeVideo() {
  const s = state.slides[state.cur];
  s.videoUrl = null; s.videoFile = null; s.pexelResults = []; s.pexelIdx = 0;
  renderEditArea(); render(); renderSlideList();
}

function manualVideoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const s = state.slides[state.cur];
  if (s.videoUrl && s.videoFile) URL.revokeObjectURL(s.videoUrl);
  s.videoFile = file;
  s.videoUrl = URL.createObjectURL(file);
  renderEditArea(); render(); renderSlideList();
}

// ── Slide List ──
function renderSlideList() {
  document.getElementById('slideList').innerHTML = state.slides.map((s,i) => `
    <div class="slide-item ${state.cur===i?'active':''}" onclick="selectSlide(${i})">
      <span class="num">${i+1}</span>
      <span class="label">${cleanLabel(s.title)}</span>
      <span class="badges">
        ${s.videoUrl?'<span class="badge badge-vid">VID</span>':''}
        <span class="badge badge-v">${s.variant}</span>
      </span>
      ${state.slides.length>1?`<button class="delete-btn" onclick="event.stopPropagation();deleteSlide(${i})">&times;</button>`:''}
    </div>
  `).join('');
}

function cleanLabel(t){return(t||'?').replace(/\n/g,' ').replace(/\*\*/g,'').replace(/\{\{|\}\}/g,'').slice(0,30);}

function selectSlide(i){state.cur=i;renderSlideList();renderEditArea();render();}
function addSlide(){state.slides.push(mkSlide('dark','dots','bottom-dark','','New Slide','Content.',false,''));state.cur=state.slides.length-1;renderSlideList();renderEditArea();render();}
function deleteSlide(i){if(state.slides.length<=1)return;state.slides.splice(i,1);if(state.cur>=state.slides.length)state.cur=state.slides.length-1;renderSlideList();renderEditArea();render();}

function upd(f,v) {
  state.slides[state.cur][f]=v;
  renderEditArea(); render(); renderSlideList();
}

function updText(f,v) {
  const s = state.slides[state.cur];
  s[f] = v;
  renderSlideList(); render();
  // Auto search when text changes (if no manual keyword set and API key exists)
  if (apiKey && !s.keyword) debouncedSearch(state.cur);
}

function updateKeyword(v) {
  state.slides[state.cur].keyword = v.trim();
}

function searchNow() {
  const kw = document.getElementById('kwInput')?.value?.trim();
  if (kw) state.slides[state.cur].keyword = kw;

}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Title Hook Hint ──
function titleHookHint(s) {
  const t = (s.title||'').replace(/\*\*/g,'').replace(/\{\{|\}\}/g,'').trim();
  if (!t || t.length < 3) return '';
  const hasQuestion = /[?？]/.test(t) || /합니까|인가요|일까|있나요|하세요|할까요|했나요/.test(t);
  const hasNumber = /\d/.test(t);
  const hasContrast = /하지만|그러나|아닌|않는|없는|vs|VS|반면/.test(t);
  const score = (hasQuestion?1:0) + (hasNumber?1:0) + (hasContrast?1:0);

  if (score >= 2) return '<div class="syntax-hint" style="color:var(--accent);opacity:0.6">✓ 후킹 요소 감지됨</div>';
  const tips = [];
  if (!hasQuestion) tips.push('질문형("~합니까?")');
  if (!hasNumber) tips.push('숫자/통계');
  if (!hasContrast) tips.push('대비/반전("하지만", "아닌")');
  return `<div class="syntax-hint" style="color:#ff8844;opacity:0.7">💡 후킹 강화: ${tips.join(', ')} 추가 권장</div>`;
}
function fmtTitle(t){let h=esc(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\{\{(.+?)\}\}/g,'<span class="acc">$1</span>');return h.replace(/\n/g,'<br>');}
function fmtCoverTitle(t){let h=esc(t);h=h.replace(/\*\*(.+?)\*\*/g,`<strong style="color:${ACCENT};text-shadow:0 0 40px rgba(57,255,20,.2)">$1</strong>`);h=h.replace(/\{\{(.+?)\}\}/g,`<span style="color:#0A0A0A;background:${ACCENT};padding:2px 14px;border-radius:6px;display:inline;box-shadow:4px 4px 0 rgba(0,0,0,.3)">$1</span>`);return h.replace(/\n/g,'<br>');}
function fmtBody(t){let h=esc(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\{\{(.+?)\}\}/g,'<span class="hl">$1</span>');return h.replace(/\n/g,'<br>');}

function gradCSS(id) {
  switch(id) {
    case 'bottom-dark': return 'linear-gradient(180deg,rgba(17,17,17,0) 0%,rgba(17,17,17,.15) 25%,rgba(17,17,17,.7) 50%,#111 65%)';

    case 'bottom-green': return `linear-gradient(180deg,rgba(0,255,136,0) 0%,rgba(0,255,136,.3) 35%,rgba(0,255,136,.85) 55%,${ACCENT} 68%)`;
    case 'full-dark': return 'linear-gradient(180deg,rgba(10,10,10,.4) 0%,rgba(10,10,10,.85) 100%)';
    default: return '';
  }
}

// ── Navigation ──
function prevSlide(){if(state.cur>0)selectSlide(state.cur-1);}
function nextSlide(){if(state.cur<state.slides.length-1)selectSlide(state.cur+1);}
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='ArrowLeft')prevSlide();if(e.key==='ArrowRight')nextSlide();});

// ── Canvas Export ──
function getTextColors(v) {
  const dk=['dark','sci-dark','navy','warm'].includes(v), gr=v==='green';
  return {
    tag:dk?'rgba(255,255,255,.4)':gr?'rgba(255,255,255,.6)':'rgba(30,30,30,.35)',
    title:dk||gr?'#fff':'#1A1A1A', acc:gr?'#fff':ACCENT,
    body:dk?'rgba(255,255,255,.5)':gr?'rgba(255,255,255,.75)':'rgba(30,30,30,.45)',
    strong:dk||gr?'#fff':'#1A1A1A', hl:gr?'#fff':ACCENT,
    footer:dk?'rgba(255,255,255,.15)':gr?'rgba(255,255,255,.3)':'rgba(30,30,30,.15)',
    corner:dk?'rgba(0,255,136,.15)':gr?'rgba(255,255,255,.15)':'rgba(0,255,136,.12)',
    topBar:gr?'#fff':ACCENT, tagBorder:gr?'#fff':ACCENT
  };
}

function drawSlideCanvas(ctx, s, videoEl) {
  const c=getTextColors(s.variant);
  const bar=document.getElementById('showTopBar').checked;
  const corners=document.getElementById('showCorners').checked;
  const mute=document.getElementById('showMute').checked;
  const footer=document.getElementById('footerText').value;

  ctx.clearRect(0,0,W,H);

  // BG
  const bgMap={dark:'#0A0A0A',light:'#FAFAFA',green:ACCENT,'sci-dark':'#0A0A0A',navy:'#080e1a',warm:'#0A0A0A'};
  ctx.fillStyle=bgMap[s.variant]||'#0A0A0A';
  ctx.fillRect(0,0,W,H);

  if(s.variant==='sci-dark'){const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0A0A0A');g.addColorStop(.4,'#001a0d');g.addColorStop(1,'#0A0A0A');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  if(s.variant==='navy'){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#080e1a');g.addColorStop(.5,'#0f1d35');g.addColorStop(1,'#0a1428');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}

  // Video
  if(videoEl&&s.videoUrl){
    const vw=videoEl.videoWidth,vh=videoEl.videoHeight;
    if(vw&&vh){const sc=Math.max(W/vw,H/vh),sw=vw*sc,sh=vh*sc;ctx.drawImage(videoEl,(W-sw)/2,(H-sh)/2,sw,sh);}
    // Grad
    const grd=ctx.createLinearGradient(0,0,0,H);
    if(s.grad==='bottom-dark'){grd.addColorStop(0,'rgba(17,17,17,0)');grd.addColorStop(.25,'rgba(17,17,17,.15)');grd.addColorStop(.5,'rgba(17,17,17,.7)');grd.addColorStop(.65,'rgba(17,17,17,1)');grd.addColorStop(1,'rgba(17,17,17,1)');}
    else if(s.grad==='bottom-light'){grd.addColorStop(0,'rgba(250,250,250,0)');grd.addColorStop(.3,'rgba(250,250,250,.2)');grd.addColorStop(.5,'rgba(250,250,250,.75)');grd.addColorStop(.65,'rgba(250,250,250,1)');grd.addColorStop(1,'rgba(250,250,250,1)');}
    else if(s.grad==='bottom-green'){grd.addColorStop(0,'rgba(0,255,136,0)');grd.addColorStop(.35,'rgba(0,255,136,.3)');grd.addColorStop(.55,'rgba(0,255,136,.85)');grd.addColorStop(.68,ACCENT);grd.addColorStop(1,ACCENT);}
    else{grd.addColorStop(0,'rgba(10,10,10,.4)');grd.addColorStop(1,'rgba(10,10,10,.85)');}
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  }

  // Top bar
  if(bar){ctx.fillStyle=c.topBar;ctx.fillRect(0,0,W,6);}

  // Deco
  if(s.deco==='grid'){ctx.save();ctx.globalAlpha=s.variant==='green'?.06:.04;ctx.strokeStyle=s.variant==='green'?'#fff':ACCENT;ctx.lineWidth=1;for(let x=0;x<=W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=0;y<=H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}ctx.restore();}
  else if(s.deco==='dots'){ctx.save();ctx.globalAlpha=s.variant==='green'?.08:.06;ctx.fillStyle=s.variant==='green'?'#fff':ACCENT;for(let x=20;x<W;x+=40)for(let y=20;y<H;y+=40){ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();}ctx.restore();}

  // Corners
  if(corners){ctx.save();ctx.strokeStyle=c.corner;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(40,80);ctx.lineTo(40,40);ctx.lineTo(80,40);ctx.stroke();ctx.beginPath();ctx.moveTo(W-80,H-70);ctx.lineTo(W-40,H-70);ctx.lineTo(W-40,H-110);ctx.stroke();ctx.restore();}

  // Mute
  if(s.videoUrl&&mute){ctx.save();ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.arc(W-56,72,20,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(W-64,66,6,12);ctx.beginPath();ctx.moveTo(W-58,66);ctx.lineTo(W-52,60);ctx.lineTo(W-52,84);ctx.lineTo(W-58,78);ctx.fill();ctx.restore();}

  // Tag
  if(s.tag){ctx.save();ctx.fillStyle=c.tagBorder;ctx.fillRect(72,52,3,24);ctx.font='600 20px Pretendard,Inter,sans-serif';ctx.fillStyle=c.tag;ctx.fillText(s.tag.toUpperCase(),89,72);ctx.restore();}

  // Text
  const tLines=parseFmt(s.title), bLines=s.body?parseFmt(s.body):[];
  const tFs=s.iscover?78:52, bFs=s.iscover?30:28;
  const tLH=tFs*1.35, bLH=bFs*1.85;
  const bH=bLines.length*bLH, tH=tLines.length*tLH;
  let cy=H-90-bH-28-tH+tLH;

  ctx.save();
  for(const line of tLines){let x=80;for(const seg of line){ctx.font=`800 ${tFs}px Pretendard,Inter,sans-serif`;ctx.fillStyle=seg.hl?c.acc:c.title;ctx.fillText(seg.text,x,cy);x+=ctx.measureText(seg.text).width;}cy+=tLH;}
  ctx.restore();

  cy=H-90-bH;
  if(bLines.length){ctx.save();for(const line of bLines){let x=80;for(const seg of line){ctx.font=`${seg.bold?700:400} ${bFs}px Pretendard,Inter,sans-serif`;ctx.fillStyle=seg.hl?c.hl:seg.bold?c.strong:c.body;ctx.fillText(seg.text,x,cy);x+=ctx.measureText(seg.text).width;}cy+=bLH;}ctx.restore();}

  if(footer){ctx.save();ctx.font='italic 500 18px Pretendard,Inter,sans-serif';ctx.fillStyle=c.footer;ctx.textAlign='center';ctx.fillText(footer,W/2,H-36);ctx.restore();}
}

function parseFmt(text){
  return(text||'').split('\n').map(line=>{
    const segs=[];let rem=line;
    while(rem.length){
      const bm=rem.match(/\*\*(.+?)\*\*/),hm=rem.match(/\{\{(.+?)\}\}/);
      let fm=null,fi=rem.length;
      if(bm&&bm.index<fi){fm='b';fi=bm.index;}
      if(hm&&hm.index<fi){fm='h';fi=hm.index;}
      if(!fm){if(rem)segs.push({text:rem,bold:false,hl:false});break;}
      if(fi>0)segs.push({text:rem.substring(0,fi),bold:false,hl:false});
      if(fm==='b'){segs.push({text:bm[1],bold:true,hl:false});rem=rem.substring(fi+bm[0].length);}
      else{segs.push({text:hm[1],bold:false,hl:true});rem=rem.substring(fi+hm[0].length);}
    }
    return segs;
  });
}

// ── Export ──
let exportAborted=false;
let currentRecorder=null;

function stopExport(){
  exportAborted=true;
  if(currentRecorder&&currentRecorder.state!=='inactive') currentRecorder.stop();
  document.getElementById('stopExportBtn').style.display='none';
  document.getElementById('downloadProgress').textContent='Export stopped.';
  setTimeout(()=>document.getElementById('downloadProgress').textContent='',2000);
}

function showStopBtn(show){
  document.getElementById('stopExportBtn').style.display=show?'block':'none';
}

async function exportSlideVideo(si) {
  if(exportAborted) throw new Error('aborted');
  const s=state.slides[si];
  const canvas=document.getElementById('exportCanvas');
  const ctx=canvas.getContext('2d');
  const dur=parseInt(document.getElementById('videoDuration').value)||8;
  let videoEl=null;

  if(s.videoUrl){
    videoEl=document.createElement('video');
    videoEl.crossOrigin='anonymous';
    videoEl.src=s.videoUrl;
    videoEl.muted=true;videoEl.loop=true;videoEl.playsInline=true;
    await new Promise((res,rej)=>{videoEl.oncanplaythrough=res;videoEl.onerror=rej;videoEl.load();});
    if(exportAborted){if(videoEl)videoEl.pause();throw new Error('aborted');}
    videoEl.currentTime=0;
    await videoEl.play();
  }

  const stream=canvas.captureStream(30);
  const rec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:8000000});
  currentRecorder=rec;
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};

  return new Promise((resolve,reject)=>{
    rec.onstop=()=>{if(videoEl)videoEl.pause();currentRecorder=null;if(exportAborted)reject(new Error('aborted'));else resolve(new Blob(chunks,{type:'video/webm'}));};
    rec.start();
    const t0=performance.now(),ms=dur*1000;
    (function frame(){if(exportAborted){rec.stop();return;}drawSlideCanvas(ctx,s,videoEl);if(performance.now()-t0<ms)requestAnimationFrame(frame);else rec.stop();})();
  });
}

async function downloadCurrentVideo(){
  exportAborted=false;
  const p=document.getElementById('downloadProgress');
  p.textContent=`Recording slide ${state.cur+1}...`;
  showStopBtn(true);
  try{const b=await exportSlideVideo(state.cur);const u=URL.createObjectURL(b);const a=document.createElement('a');a.download=`bdm_slide_${state.cur+1}.webm`;a.href=u;a.click();URL.revokeObjectURL(u);p.textContent='Done!';}
  catch(e){if(e.message!=='aborted')p.textContent='Error: '+e.message;}
  showStopBtn(false);
  if(!exportAborted)setTimeout(()=>p.textContent='',3000);
}

async function downloadAllVideos(){
  exportAborted=false;
  const p=document.getElementById('downloadProgress');
  showStopBtn(true);
  for(let i=0;i<state.slides.length;i++){
    if(exportAborted) break;
    p.textContent=`Recording ${i+1}/${state.slides.length}...`;
    try{const b=await exportSlideVideo(i);const u=URL.createObjectURL(b);const a=document.createElement('a');a.download=`bdm_slide_${i+1}.webm`;a.href=u;a.click();URL.revokeObjectURL(u);await new Promise(r=>setTimeout(r,500));}
    catch(e){if(e.message==='aborted')break;p.textContent=`Error slide ${i+1}: `+e.message;showStopBtn(false);return;}
  }
  showStopBtn(false);
  if(!exportAborted){p.textContent=`All ${state.slides.length} exported!`;setTimeout(()=>p.textContent='',3000);}
}

async function downloadCurrentPNG(){
  const p=document.getElementById('downloadProgress');
  const s=state.slides[state.cur];
  const canvas=document.getElementById('exportCanvas');
  const ctx=canvas.getContext('2d');
  p.textContent='Rendering...';
  let vid=null;
  if(s.videoUrl){vid=document.createElement('video');vid.crossOrigin='anonymous';vid.src=s.videoUrl;vid.muted=true;await new Promise(r=>{vid.onloadeddata=r;vid.load();});vid.currentTime=1;await new Promise(r=>setTimeout(r,300));}
  drawSlideCanvas(ctx,s,vid);
  const a=document.createElement('a');a.download=`bdm_slide_${state.cur+1}.png`;a.href=canvas.toDataURL('image/png');a.click();
  p.textContent='Done!';setTimeout(()=>p.textContent='',2000);
}

document.getElementById('apiDot').className = 'status-dot ' + (apiKey ? 'ok' : 'idle');
renderSlideList(); renderEditArea(); render();
