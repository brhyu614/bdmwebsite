<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900');</style>
  </defs>
  <circle cx="250" cy="250" r="248" fill="#0a0a0a"/>
  <circle cx="250" cy="250" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
  <!-- Ring Only - No bars -->
  <text x="250" y="270" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="900" font-size="130" fill="white" letter-spacing="-5">BDM</text>
</svg>
