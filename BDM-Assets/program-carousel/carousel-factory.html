<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDM Lab - Carousel Factory</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#161616;--border:#222;--border-light:#333;
  --accent:#00FF88;--accent-dim:rgba(0,255,136,0.15);
  --text:#e0e0e0;--text-dim:#888;--text-bright:#fff;
  --danger:#ff4444;--warning:#ffaa00;
  --sidebar-w:420px;
}
html{font-size:14px}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.main{flex:1;overflow-y:auto;padding:24px}

/* Utility */
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px;font-weight:700}
.label{font-size:12px;color:var(--text-dim);margin-bottom:4px;display:block}
input[type="text"],input[type="password"],textarea,select{
  width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:8px 10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;
  transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
select{cursor:pointer}
button{
  font-family:inherit;cursor:pointer;border:none;border-radius:6px;
  padding:8px 16px;font-size:13px;font-weight:600;transition:all .15s}
.btn-accent{background:var(--accent);color:#000}
.btn-accent:hover{background:#00dd77}
.btn-accent:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#cc3333}
.btn-small{padding:4px 10px;font-size:11px}
.btn-full{width:100%}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-cover{background:var(--accent);color:#000}
.badge-tag{background:var(--accent-dim);color:var(--accent);margin-right:4px}
.badge-version{background:var(--accent-dim);color:var(--accent);font-size:12px;padding:4px 10px}

/* Image grid */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:8px}
.img-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb .remove{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer}
.img-thumb .cover-badge{position:absolute;bottom:2px;left:2px}
.img-thumb .filename{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#ccc;font-size:9px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Drop zone */
.dropzone{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;color:var(--text-dim);font-size:12px;transition:all .2s;cursor:pointer}
.dropzone.dragover{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.dropzone input{display:none}

/* Slide cards */
.slide-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.slide-card.variant-dark{border-left:3px solid #888}
.slide-card.variant-light{border-left:3px solid #ddd}
.slide-card.variant-green{border-left:3px solid var(--accent)}
.slide-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.slide-num{font-size:11px;color:var(--text-dim);font-weight:700}
.slide-heading{font-size:18px;font-weight:800;color:var(--text-bright);margin-bottom:8px;line-height:1.4}
.slide-body{font-size:13px;line-height:1.8;color:var(--text)}
.slide-body strong{color:var(--text-bright);font-weight:700}
.slide-body .hl{background:var(--accent-dim);color:var(--accent);padding:1px 4px;border-radius:3px;font-weight:600}

/* Slide image area */
.slide-img-area{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.slide-img-search{display:flex;gap:6px;margin-bottom:8px}
.slide-img-search input{flex:1}
.pexels-results{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.pexels-thumb{aspect-ratio:1;border-radius:4px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.pexels-thumb:hover{border-color:var(--accent)}
.pexels-thumb.selected{border-color:var(--accent)}
.pexels-thumb img{width:100%;height:100%;object-fit:cover}
.pexels-thumb.video-thumb{position:relative}
.pexels-thumb.video-thumb::after{content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:20px;text-shadow:0 2px 4px rgba(0,0,0,.6);pointer-events:none}
.pexels-thumb .duration-badge{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px}
.media-toggle{display:inline-flex;gap:2px;background:var(--bg);border-radius:4px;padding:2px;margin-right:6px}
.media-toggle button{background:none;border:none;color:var(--text-dim);font-size:11px;padding:3px 8px;border-radius:3px;cursor:pointer}
.media-toggle button.active{background:var(--accent);color:#000;font-weight:600}
.slide-img-preview{width:100%;max-height:500px;border-radius:6px;overflow:hidden;margin-top:8px;background:#000;display:flex;align-items:center;justify-content:center}
.slide-img-preview img,.slide-img-preview video{width:100%;max-height:500px;object-fit:contain;display:block}
.slide-dropzone{border:1px dashed var(--border);border-radius:6px;padding:12px;text-align:center;color:var(--text-dim);font-size:11px;cursor:pointer;transition:all .2s}
.slide-dropzone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.slide-dropzone input{display:none}

/* Review panel */
.review-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:20px}
.score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.score-item{text-align:center}
.score-label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.score-value{font-size:28px;font-weight:800;color:var(--accent)}
.score-total{text-align:center;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:12px}
.score-total .num{font-size:36px;font-weight:900;color:var(--accent)}
.score-total .max{font-size:14px;color:var(--text-dim)}
.warning-box{background:rgba(255,170,0,.1);border:1px solid var(--warning);color:var(--warning);padding:10px;border-radius:6px;font-size:12px;text-align:center;margin-top:8px}

/* Feedback */
.feedback-area{margin-top:20px}
.feedback-area textarea{min-height:80px;margin-bottom:8px}
.feedback-actions{display:flex;gap:8px}

/* Export */
.export-bar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* PNG render (off-screen 1080x1350 Instagram format) */
#pngRenderContainer{position:fixed;left:-99999px;top:0;width:1080px;height:1350px;pointer-events:none;z-index:-1}
.png-slide{width:1080px;height:1350px;font-family:'Pretendard Variable',Pretendard,sans-serif;display:flex;flex-direction:column;overflow:hidden;position:relative}
.png-slide.png-dark{background:#0a0a0a;color:#fff}
.png-slide.png-light{background:#f5f5f5;color:#0a0a0a}
.png-slide.png-green{background:#00FF88;color:#0a0a0a}
.png-image-area{width:100%;height:900px;background:#222;overflow:hidden;position:relative;flex-shrink:0}
.png-image-area img{width:100%;height:100%;object-fit:cover;display:block}
.png-image-area.no-image{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#333)}
.png-content{flex:1;padding:40px 70px 50px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
.png-tag{display:inline-block;padding:8px 18px;border-radius:6px;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;align-self:flex-start}
.png-slide.png-dark .png-tag{background:rgba(0,255,136,.2);color:#00FF88}
.png-slide.png-light .png-tag{background:#00FF88;color:#0a0a0a}
.png-slide.png-green .png-tag{background:#0a0a0a;color:#00FF88}
.png-hook-phrase{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:16px}
.png-hook-number{font-size:52px;font-weight:900;line-height:1;color:#00FF88;letter-spacing:-0.01em}
.png-hook-label{font-size:28px;font-weight:800;color:#00FF88;line-height:1.2}
.png-slide.png-green .png-hook-number,.png-slide.png-green .png-hook-label{color:#0a0a0a}
.png-heading{font-size:46px;font-weight:900;line-height:1.2;margin-bottom:16px;letter-spacing:-0.02em}
.png-body{font-size:24px;line-height:1.5;color:inherit;opacity:.92;flex:1}
.png-body strong{font-weight:800;color:#fff}
.png-slide.png-light .png-body strong{color:#0a0a0a}
.png-slide.png-green .png-body strong{color:#0a0a0a}
.png-body .hl{background:rgba(0,255,136,.25);color:#00FF88;padding:2px 8px;border-radius:4px;font-weight:700}
.png-slide.png-light .png-body .hl{background:#00FF88;color:#0a0a0a}
.png-slide.png-green .png-body .hl{background:#0a0a0a;color:#00FF88}
.png-footer{display:flex;justify-content:space-between;align-items:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:20px}
.png-slide.png-light .png-footer{border-top-color:rgba(0,0,0,.15)}
.png-slide.png-green .png-footer{border-top-color:rgba(0,0,0,.2)}
.png-brand-logo{width:40px;height:40px;background:#00FF88;color:#0a0a0a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px}
.png-slide.png-green .png-brand-logo{background:#0a0a0a;color:#00FF88}
.png-brand-text{display:flex;align-items:center;gap:12px;font-weight:700}
.png-page{font-size:18px;color:#888;font-weight:600}
.png-slide.png-green .png-page{color:#0a0a0a;opacity:.7}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-title{font-size:16px;font-weight:700;color:var(--text-bright);margin-bottom:16px}
.modal textarea{min-height:300px;font-size:12px;line-height:1.6}

/* Learning rules */
.rules-list{max-height:180px;overflow-y:auto}
.rule-item{font-size:11px;color:var(--text-dim);padding:4px 0;border-bottom:1px solid var(--border)}
.rule-item::before{content:"";display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-right:6px}

/* Loading */
.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.generating-overlay{position:absolute;inset:0;background:rgba(10,10,10,.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;border-radius:10px;z-index:10}
.generating-overlay .msg{font-size:13px;color:var(--accent)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--text-dim);text-align:center;gap:12px}
.empty-state .icon{font-size:48px;opacity:.3}
.empty-state p{font-size:14px}

/* Responsive */
@media(max-width:900px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:auto;max-height:50vh;border-right:none;border-bottom:1px solid var(--border)}
  .main{padding:16px}
}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#000;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div style="width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:14px">B</div>
        <div style="font-size:15px;font-weight:800;color:var(--text-bright)">Carousel Factory</div>
      </div>
      <div style="font-size:11px;color:var(--text-dim)">BDM Lab 인스타그램 캐러셀 생성기</div>
    </div>

    <!-- API Keys -->
    <div>
      <div class="section-title">API 키</div>
      <label class="label">Claude API 키</label>
      <input type="password" id="claudeKey" placeholder="sk-ant-..." />
      <label class="label" style="margin-top:8px">Gemini API 키 (자체 점검용)</label>
      <input type="password" id="geminiKey" placeholder="AI..." />
    </div>

    <!-- Content Source -->
    <div>
      <div class="section-title">콘텐츠 소스</div>
      <div class="tabs" id="sourceTabs">
        <div class="tab active" data-tab="source-website">웹사이트 글</div>
        <div class="tab" data-tab="source-manual">직접 입력</div>
      </div>
      <div id="source-website" class="tab-content active">
        <select id="articleSelect">
          <option value="">-- 글 선택 --</option>
        </select>
      </div>
      <div id="source-manual" class="tab-content">
        <label class="label">제목</label>
        <input type="text" id="manualTitle" placeholder="캐러셀 제목" />
        <label class="label" style="margin-top:8px">본문</label>
        <textarea id="manualBody" rows="8" placeholder="캐러셀로 만들 내용을 입력하세요..."></textarea>
      </div>
    </div>

    <!-- Images -->
    <div>
      <div class="section-title">이미지</div>
      <div class="dropzone" id="imageDropzone">
        <div>이미지를 드래그하거나 클릭하여 업로드</div>
        <div style="font-size:10px;margin-top:4px;color:var(--text-dim)">cover_ 로 시작하는 파일은 커버로 표시</div>
        <input type="file" id="imageInput" multiple accept="image/*" />
      </div>
      <div class="img-grid" id="imageGrid"></div>
    </div>

    <!-- Generate -->
    <button class="btn-accent btn-full" id="generateBtn" style="padding:12px;font-size:14px">
      캐러셀 생성
    </button>

    <!-- Prompt Settings -->
    <button class="btn-outline btn-full" id="promptSettingsBtn">
      프롬프트 설정
    </button>

    <!-- Learning Rules -->
    <div>
      <div class="section-title">학습 규칙</div>
      <div id="learningRules" class="rules-list">
        <div style="font-size:11px;color:var(--text-dim)">아직 축적된 규칙이 없습니다.</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#x1F3A0;</div>
      <p>왼쪽에서 콘텐츠를 선택하고<br/>"캐러셀 생성"을 눌러주세요</p>
    </div>
    <div id="previewArea" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <h2 style="font-size:18px;font-weight:800;color:var(--text-bright)">캐러셀 미리보기</h2>
          <span class="badge-version" id="versionBadge">v1</span>
        </div>
        <div class="export-bar">
          <button class="btn-accent btn-small" id="downloadPng">📥 PNG 일괄 다운로드</button>
          <button class="btn-outline btn-small" id="copyYaml">YAML 복사</button>
          <button class="btn-outline btn-small" id="copyJson">JSON 복사</button>
        </div>
      </div>
      <div id="slidesContainer"></div>

      <!-- Review -->
      <div class="review-panel" id="reviewPanel" style="display:none">
        <div class="section-title">자체 점검 (Gemini)</div>
        <div id="reviewContent"></div>
      </div>

      <!-- Feedback -->
      <div class="feedback-area">
        <div class="section-title" style="margin-top:12px">피드백</div>
        <textarea id="feedbackText" placeholder="수정사항이나 개선 요청을 입력하세요..."></textarea>
        <div class="feedback-actions">
          <button class="btn-accent" id="regenerateBtn">피드백 반영 재생성</button>
          <button class="btn-outline" id="approveBtn" style="border-color:var(--accent);color:var(--accent)">최종 승인</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Prompt Settings Modal -->
<div class="modal-overlay" id="promptModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title">프롬프트 설정</div>
      <button class="btn-outline btn-small" id="closePromptModal">&times; 닫기</button>
    </div>
    <div class="tabs" id="promptTabs">
      <div class="tab active" data-tab="prompt-gen">생성 프롬프트</div>
      <div class="tab" data-tab="prompt-review">자체 점검 프롬프트</div>
    </div>
    <div id="prompt-gen" class="tab-content active">
      <textarea id="genPromptText" rows="18"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-accent" id="saveGenPrompt">저장</button>
        <button class="btn-outline" id="resetGenPrompt">기본값 복원</button>
      </div>
    </div>
    <div id="prompt-review" class="tab-content">
      <textarea id="reviewPromptText" rows="12"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-accent" id="saveReviewPrompt">저장</button>
        <button class="btn-outline" id="resetReviewPrompt">기본값 복원</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ======== CONSTANTS ========
const ARTICLES = [
  {slug:'2026-01-25-pinkydoll-npc-dwell-time', title:'NPC 스트리머가 알고리즘을 해킹하는 방법'},
  {slug:'2026-01-30-tarte-brand-trip-fairness', title:'타르트 브랜드 트립이 폭발한 건 불공정이 보였기 때문이다'},
  {slug:'2026-02-05-demure-template-meme', title:'Very Demure 밈이 알려주는 템플릿 바이럴의 법칙'},
  {slug:'2026-02-08-ryanair-tone-algorithm', title:'라이언에어가 고객을 놀리는데 팔로워가 늘어나는 이유'},
  {slug:'2026-02-12-stanley-cup-viral', title:'스탠리 텀블러가 설명 없이 바이럴 된 구조'},

## 커버 slide 구성 (매우 중요)
cover 필드는 하나의 "읽을 수 있는 헤드라인"처럼 3요소로 구성:

1. **hook_number**: 숫자 또는 강한 형용사 1-2단어 (tagline의 첫 부분)
   - 숫자가 있으면: "2800%", "7.5억", "논란의"
   - 없으면: 강렬한 수식어 1-2단어 ("논란의", "역발상", "미지의")
2. **hook_label**: 주제 카테고리 2-3단어 (tagline의 뒷 부분)
   - hook_number와 자연스럽게 연결 (예: "마케팅 전략", "성장 공식", "브랜드 전략")
   - 두 단어 합쳐서 하나의 고리로 읽혀야 함 (예: "논란의 + 마케팅 전략 = 논란의 마케팅 전략")
3. **title (heading)**: 진짜 후크 — 스크롤 멈추게 하는 강렬한 질문/선언 (10-18자 권장)
   - ❌ 나쁜 예: "고객을 놀리는 브랜드가 팔로워 수배 늘린 비결" (너무 긴 설명형)
   - ✅ 좋은 예: "고객을 놀리는 브랜드? 왜 성공하나?" (질문형, 간결)
   - ✅ 좋은 예: "팔로워 280만, 비결은 고객 조롱" (충격적 수치+반전)
   - ✅ 좋은 예: "고객 조롱 = 팔로워 +280만" (수식 형태)
   - 반드시 의외성, 충격, 반전, 궁금증 중 하나를 유발
4. **subtitle**: 보조 설명 (title로 충분하면 생략 가능, 짧게)

예시 출력:
```
{
  "cover": {
    "hook_number": "논란의",
    "hook_label": "마케팅 전략",
    "title": "팔로워 280만, 왜 늘어날까?",
    "subtitle": "Ryanair의 역발상 운영",
    "video_keyword": "ryanair plane",
    "media_type": "video"
  }
}
```
hook_number + hook_label = "논란의 마케팅 전략" (한 줄로 읽힘)
title = 강한 질문 형태의 후크

## 캐러셀 구조 규칙
1. cover: 3초 안에 멈추게 할 훅. 반드시 숫자/통계로 시작
2. slides: 6-8개. 각 슬라이드 한 화면에 읽을 수 있는 분량 (3-5문장)
3. 흐름: HOOK → DISCOVERY/PROBLEM → INSIGHT/DATA → SOLUTION → ACTION
4. outro: CTA + bigdatamarketinglab.com 링크
5. **bold**는 강조, {{중요문장}}은 초록 하이라이트
6. 각 슬라이드에 맞는 영문 Pexels 검색 키워드 (video_keyword) 지정 — **매우 중요**:

   ### 핵심 원칙: **기사 주제가 아닌, 슬라이드의 메시지(주장)에 맞는 키워드**
   - 기사가 Stanley(스탠리)에 대한 것이라도, 모든 슬라이드 키워드가 "stanley factory" 같은 주제 기반이면 안 됨
   - **슬라이드가 전달하려는 메시지/주장/감정**을 시각화할 수 있는 장면을 키워드로
   - 예 (스탠리 기사의 "마케팅비 없이 성공" 슬라이드):
     - ❌ "old factory workers" — 스탠리가 공장 회사라는 주제만 반영, 슬라이드 메시지(마케팅 없이 바이럴)와 무관
     - ❌ "stanley factory" — 같은 이유로 나쁨
     - ✅ "smartphone social media organic" — 유기적 바이럴의 시각화
     - ✅ "empty billboard city" — 전통 광고 없음의 대비
     - ✅ "woman tiktok recording product" — 소비자 주도 홍보
     - ✅ "word mouth conversation" — 입소문의 상징

   ### 추가 규칙
   - **브랜드명은 전체 슬라이드의 30-40%에만 사용** (주로 cover + 제품 자체 다루는 슬라이드 1-2개)
   - 같은 브랜드 키워드 반복 금지 — 비슷한 사진만 나와서 지루함
   - meta.video_keyword_global 에는 기사의 핵심 브랜드/제품 2-3단어 (예: "stanley cup tumbler")
   - 추상적 개념어 절대 금지: "old brand transformation", "zero budget marketing", "viral marketing", "brand strategy" 같은 추상 개념은 Pexels에 결과 없음
   - 2-4 영문 소문자 단어
   - 각 video_keyword는 서로 달라야 함 (중복 금지)

   ### 슬라이드 유형별 키워드 선택 가이드
   슬라이드의 주장/메시지를 먼저 파악 → 그 주장을 시각화하는 장면 찾기:

   | 슬라이드 주장 | ❌ 나쁜 키워드 (주제 기반) | ✅ 좋은 키워드 (메시지 기반) |
   |---|---|---|
   | "마케팅비 없이 성공했다" | old factory workers | empty billboard city / social media organic |
   | "젊은 여성이 제품을 발견" | stanley tumbler | young woman tiktok discovery |
   | "전통 광고가 통하지 않는다" | traditional ad agency | empty television screen / unused billboard |
   | "데이터가 모든 것을 보여준다" | data center | laptop analytics chart |
   | "소비자가 스스로 홍보한다" | stanley customer | woman recording product review |
   | "오래된 브랜드의 부활" | 100 year old factory | old photo frame revival |
   | "경쟁사를 앞섰다" | competitors meeting | runner crossing finish line |
   | "입소문이 퍼졌다" | viral marketing | dominoes falling cascade / ripple water |

   ### 체크 방법
   키워드 작성 후, 스스로 질문하라:
   1. "이 키워드로 Pexels에서 나온 사진이, 슬라이드의 **주장**을 뒷받침하는가?"
   2. "아니면 단순히 기사의 **주제(브랜드/업종)**만 보여주는가?"
   3. 답이 2번이면 키워드를 메시지 기반으로 재작성
7. **media_type** 선택 (각 슬라이드와 cover에 반드시 지정):
   - "video" 선택: 움직임/동작이 있는 장면, 소비자 행동 (TikTok 녹화, 제품 사용, 언박싱), 트렌드/바이럴 주제, 생동감 있는 상황, 시간의 흐름 표현
   - "photo" 선택: 정적인 객체/차트, 인물 포트레이트, 제품 단독 샷, 통계/데이터 시각화, 개념적/비유적 장면 (domino, sunrise, handshake 등), 깔끔한 미니멀 장면
   - 전체 슬라이드 중 대략 40-60%를 video로 (너무 한쪽에 치우치지 않도록)
   - cover는 주로 "video" 권장 (스크롤 멈추는 효과가 큼)
8. variant 순서: dark, light, green 반복

  document.getElementById('approveBtn').addEventListener('click', handleApprove);
  document.getElementById('copyYaml').addEventListener('click', () => copyExport('yaml'));
  document.getElementById('copyJson').addEventListener('click', () => copyExport('json'));

  document.getElementById('promptSettingsBtn').addEventListener('click', () => document.getElementById('promptModal').classList.add('open'));
  document.getElementById('closePromptModal').addEventListener('click', () => document.getElementById('promptModal').classList.remove('open'));
  document.getElementById('promptModal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  document.getElementById('saveGenPrompt').addEventListener('click', () => {
    localStorage.setItem('cf_gen_prompt', document.getElementById('genPromptText').value);
    showToast('생성 프롬프트 저장됨');
  });
  document.getElementById('saveReviewPrompt').addEventListener('click', () => {
    localStorage.setItem('cf_review_prompt', document.getElementById('reviewPromptText').value);

  document.getElementById('resetGenPrompt').addEventListener('click', () => {
    document.getElementById('genPromptText').value = DEFAULT_GEN_PROMPT;

    document.getElementById('reviewPromptText').value = DEFAULT_REVIEW_PROMPT;

    showToast('기본값 복원됨');

});

// ======== TABS ========
function setupTabs(tabsId, contentIds) {
  const container = document.getElementById(tabsId);
  container.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      contentIds.forEach(id => {
        document.getElementById(id).classList.toggle('active', id === tab.dataset.tab);
      });
    });
  });
}

// ======== IMAGE UPLOAD ========
function setupImageUpload() {
  const dz = document.getElementById('imageDropzone');
  const input = document.getElementById('imageInput');

  dz.addEventListener('click', () => input.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  input.addEventListener('change', e => handleFiles(e.target.files));
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      uploadedImages.push({ file, dataUrl: e.target.result, name: file.name });
      renderImageGrid();
    };
    reader.readAsDataURL(file);
  });
}

function renderImageGrid() {
  const grid = document.getElementById('imageGrid');
  grid.innerHTML = '';
  uploadedImages.forEach((img, i) => {
    const isCover = img.name.toLowerCase().startsWith('cover_');
    const div = document.createElement('div');
    div.className = 'img-thumb';
    div.innerHTML = `
      <img src="${img.dataUrl}" alt="${img.name}" />
      <div class="remove" data-idx="${i}">&times;</div>
      ${isCover ? '<div class="cover-badge"><span class="badge badge-cover">COVER</span></div>' : ''}
      <div class="filename">${img.name}</div>
    `;
    grid.appendChild(div);
  });
  grid.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      uploadedImages.splice(parseInt(btn.dataset.idx), 1);
      renderImageGrid();
    });
  });
}

// ======== GENERATE ========
async function handleGenerate() {
  const claudeKey = document.getElementById('claudeKey')?.value?.trim() || DEFAULT_CLAUDE_KEY;
  if (!claudeKey) { showToast('Claude API 키를 입력하세요'); return; }

  // Get content
  const sourceTab = document.querySelector('#sourceTabs .tab.active').dataset.tab;
  let title = '', body = '';
  if (sourceTab === 'source-website') {
    const slug = document.getElementById('articleSelect').value;
    if (!slug) { showToast('글을 선택하세요'); return; }
    const article = ARTICLES.find(a => a.slug === slug);
    title = article.title;
    body = `웹사이트 글 제목: ${article.title}\n슬러그: ${article.slug}\n\n⚠️ 본문이 제공되지 않았습니다. 제목만 있는 상태입니다.\n\n지시사항:\n1. 구체적 수치/통계/퍼센트/매출액 등을 절대 지어내지 마세요 (예: "2800%", "7.5억 달러" 같은 숫자 창작 금지)\n2. 브랜드의 구체적 활동/사례/캠페인 세부사항을 창작하지 마세요\n3. 제목에서 확실히 추론 가능한 일반적 마케팅 인사이트만 다루세요\n4. 확실하지 않은 정보는 "~로 알려져 있다", "일반적으로 ~한 경향이 있다" 같은 추정 표현 사용\n5. hook_number 필드는 비워두거나 일반적 표현 사용 (예: "수배"같은)\n6. 데이터가 필요한 슬라이드는 "구체적 수치는 원문 참고"라고 표기하거나 일반 개념으로 대체`;
  } else {
    title = document.getElementById('manualTitle').value.trim();
    body = document.getElementById('manualBody').value.trim();
    if (!title || !body) { showToast('제목과 본문을 입력하세요'); return; }
  }

  version = 1;
  feedbackHistory = [];
  slideImages = {};
  await generate(claudeKey, title, body);
}

async function handleRegenerate() {
  const claudeKey = document.getElementById('claudeKey')?.value?.trim() || DEFAULT_CLAUDE_KEY;
  if (!claudeKey) { showToast('Claude API 키를 입력하세요'); return; }
  const feedback = document.getElementById('feedbackText').value.trim();
  if (!feedback) { showToast('피드백을 입력하세요'); return; }

  feedbackHistory.push(feedback);
  version++;
  const sourceTab = document.querySelector('#sourceTabs .tab.active').dataset.tab;
  let title = '', body = '';
  if (sourceTab === 'source-website') {
    const slug = document.getElementById('articleSelect').value;
    const article = ARTICLES.find(a => a.slug === slug);
    title = article ? article.title : '';
    body = `웹사이트 글 제목: ${title}`;
  } else {
    title = document.getElementById('manualTitle').value.trim();
    body = document.getElementById('manualBody').value.trim();
  }

  const feedbackContext = `\n\n## 이전 생성 결과\n${JSON.stringify(currentCarousel, null, 2)}\n\n## 피드백\n${feedbackHistory.join('\n')}\n\n위 피드백을 반영하여 캐러셀을 수정해주세요.`;
  await generate(claudeKey, title, body + feedbackContext);
}

async function generate(claudeKey, title, body) {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> 생성 중...';

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('previewArea').style.display = 'block';
  document.getElementById('slidesContainer').innerHTML = '<div style="text-align:center;padding:40px"><span class="loading"></span><div style="margin-top:12px;color:var(--text-dim)">Claude에게 캐러셀 생성 요청 중...</div></div>';
  document.getElementById('reviewPanel').style.display = 'none';

  const systemPrompt = (localStorage.getItem('cf_gen_prompt') || DEFAULT_GEN_PROMPT);
  const learnings = getLearnings();
  const learningSection = learnings.length > 0 ? `\n\n## 축적된 학습 규칙\n${learnings.map((r, i) => `${i + 1}. ${r}`).join('\n')}` : '';

  const userMsg = `다음 콘텐츠를 인스타그램 캐러셀로 만들어주세요.\n\n제목: ${title}\n\n${body}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: systemPrompt + learningSection + '\n\nYou must respond with valid JSON only, no other text.',
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`Claude API 오류 (${resp.status}): ${err}`);
    }

    const data = await resp.json();
    let text = data.content[0].text.trim();

    // Try to extract JSON from possible markdown code blocks
    const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) text = jsonMatch[1].trim();

    currentCarousel = JSON.parse(text);
    renderCarousel();
    document.getElementById('versionBadge').textContent = `v${version}`;
    document.getElementById('feedbackText').value = '';

    // Auto self-review
    await runSelfReview();
  } catch (e) {
    document.getElementById('slidesContainer').innerHTML = `<div style="color:var(--danger);padding:20px">오류: ${escapeHtml(e.message)}</div>`;
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '캐러셀 생성';
  }
}

// ======== RENDER ========
function renderCarousel() {
  const container = document.getElementById('slidesContainer');
  if (!currentCarousel) return;
  const c = currentCarousel;
  let html = '';

  // Cover
  html += `
    <div class="slide-card variant-dark">
      <div class="slide-header">
        <span class="slide-num">COVER</span>
        <span class="badge badge-tag">HOOK</span>
      </div>
      <div class="slide-heading">${escapeHtml(c.cover.title || '')}</div>
      <div class="slide-body">${formatBody(c.cover.subtitle || '')}</div>
      ${c.cover.hook_number ? `<div style="margin-top:8px;font-size:24px;font-weight:900;color:var(--accent)">${escapeHtml(c.cover.hook_number)}</div>` : ''}
      ${c.cover.hook_label ? `<div style="font-size:12px;color:var(--text-dim)">${escapeHtml(c.cover.hook_label)}</div>` : ''}
      ${renderSlideImageArea(-1, c.cover.video_keyword || '', c.cover.media_type || 'photo')}
    </div>`;

  // Slides
  if (c.slides && Array.isArray(c.slides)) {
    c.slides.forEach((slide, i) => {
      const variant = (slide.variant || 'dark').replace(/\|.*/, '');
      html += `
        <div class="slide-card variant-${variant}">
          <div class="slide-header">
            <span class="slide-num">#${i + 1}</span>
            ${slide.tag ? `<span class="badge badge-tag">${escapeHtml(slide.tag)}</span>` : ''}
            <span style="font-size:10px;color:var(--text-dim);margin-left:auto">${variant}</span>
          </div>
          <div class="slide-heading">${escapeHtml(slide.heading || '')}</div>
          <div class="slide-body">${formatBody(slide.body || '')}</div>
          ${renderSlideImageArea(i, slide.video_keyword || '', slide.media_type || 'photo')}
        </div>`;
    });
  }

  // Outro
  if (c.outro) {
    html += `
      <div class="slide-card variant-green">
        <div class="slide-header">
          <span class="slide-num">OUTRO</span>
          <span class="badge badge-tag">CTA</span>
        </div>
        <div class="slide-heading">${escapeHtml(c.outro.closing || '')}</div>
        <div class="slide-body">${formatBody(c.outro.cta || '')}</div>
        <div style="margin-top:8px;font-size:12px;color:var(--accent)">${(c.outro.links || []).join(' / ')}</div>
        ${renderSlideImageArea(999, '', 'photo')}
      </div>`;
  }

  container.innerHTML = html;
  attachSlideImageHandlers();
}

function renderSlideImageArea(slideIdx, defaultKeyword, defaultMediaType) {
  const existing = slideImages[slideIdx];
  const searchId = `search-${slideIdx}`;
  const resultsId = `results-${slideIdx}`;
  const previewId = `preview-${slideIdx}`;
  const dropId = `slidedrop-${slideIdx}`;
  const fileId = `slidefile-${slideIdx}`;
  const mt = (defaultMediaType === 'video') ? 'video' : 'photo';
  const photoActive = mt === 'photo' ? 'active' : '';
  const videoActive = mt === 'video' ? 'active' : '';
  const defaultSource = 'pexels';

  let previewHtml = '';
  if (existing) {
    if (existing.type === 'video') {
      previewHtml = `<video src="${existing.url}" controls muted loop></video>`;
    } else {
      previewHtml = `<img src="${existing.url}" />`;
    }
  }

  return `
    <div class="slide-img-area">
      <div class="slide-img-search">
        <div class="media-toggle" data-slide="${slideIdx}">
          <button type="button" class="media-btn ${photoActive}" data-slide="${slideIdx}" data-type="photo">사진</button>
          <button type="button" class="media-btn ${videoActive}" data-slide="${slideIdx}" data-type="video">동영상</button>
        </div>
        <div class="media-toggle source-toggle" data-slide="${slideIdx}">
          <button type="button" class="source-btn active" data-slide="${slideIdx}" data-source="pexels">Pexels</button>
          <button type="button" class="source-btn" data-slide="${slideIdx}" data-source="pixabay">Pixabay</button>
        </div>
        <input type="text" id="${searchId}" value="${escapeHtml(defaultKeyword)}" placeholder="검색어 (영문)" />
        <button class="btn-outline btn-small pexels-search-btn" data-slide="${slideIdx}" data-type="${mt}" data-source="${defaultSource}">검색</button>
      </div>
      <div class="pexels-results" id="${resultsId}"></div>
      <div class="slide-dropzone" id="${dropId}" data-slide="${slideIdx}">
        이미지/동영상을 드래그하거나 클릭하여 직접 업로드
        <input type="file" id="${fileId}" accept="image/*,video/*" style="display:none" />
      </div>
      <div class="slide-img-preview" id="${previewId}">${previewHtml}</div>
    </div>`;
}

function attachSlideImageHandlers() {
  // Media type toggle (사진 / 동영상)
  document.querySelectorAll('.media-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.dataset.slide;
      const type = btn.dataset.type;
      document.querySelectorAll(`.media-btn[data-slide="${idx}"]`).forEach(b => {
        b.classList.toggle('active', b.dataset.type === type);
      });
      const searchBtn = document.querySelector(`.pexels-search-btn[data-slide="${idx}"]`);
      if (searchBtn) searchBtn.dataset.type = type;
    });
  });

  // Source toggle (Pexels / Pixabay)
  document.querySelectorAll('.source-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.dataset.slide;
      const source = btn.dataset.source;
      document.querySelectorAll(`.source-btn[data-slide="${idx}"]`).forEach(b => {
        b.classList.toggle('active', b.dataset.source === source);
      });
      const searchBtn = document.querySelector(`.pexels-search-btn[data-slide="${idx}"]`);
      if (searchBtn) searchBtn.dataset.source = source;
    });
  });

  // Search handler (Pexels OR Pixabay, photo OR video)
  document.querySelectorAll('.pexels-search-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = parseInt(btn.dataset.slide);
      const mediaType = btn.dataset.type === 'video' ? 'video' : 'photo';
      const source = btn.dataset.source === 'pixabay' ? 'pixabay' : 'pexels';
      const searchId = `search-${idx}`;
      const resultsId = `results-${idx}`;
      const query = document.getElementById(searchId).value.trim();
      if (!query) return;

      const resultsEl = document.getElementById(resultsId);
      resultsEl.innerHTML = '<span class="loading"></span>';

      try {
        if (source === 'pixabay') {
          await searchPixabay(idx, query, mediaType, resultsEl);
        } else {
          await searchPexels(idx, query, mediaType, resultsEl);
        }
      } catch (e) {
        resultsEl.innerHTML = `<div style="font-size:11px;color:var(--danger)">${e.message}</div>`;
      }
    });
  });

  // Slide dropzones
  document.querySelectorAll('.slide-dropzone').forEach(dz => {
    const idx = parseInt(dz.dataset.slide);
    const fileInput = dz.querySelector('input[type="file"]');

    dz.addEventListener('click', e => {
      if (e.target === fileInput) return;
      fileInput.click();
    });
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && (file.type.startsWith('image/') || file.type.startsWith('video/'))) loadSlideImage(idx, file);
    });
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) loadSlideImage(idx, e.target.files[0]);
    });
  });
}

async function searchPexels(idx, query, mediaType, resultsEl) {
  const endpoint = mediaType === 'video'
    ? `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=8&size=medium`
    : `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=8&size=small`;

  const resp = await fetch(endpoint, { headers: { Authorization: PEXELS_KEY } });
  if (!resp.ok) {
    const errText = resp.status === 401 ? 'Pexels API 키 무효' : resp.status === 429 ? 'Pexels 쿼터 초과' : `Pexels 에러 ${resp.status}`;
    resultsEl.innerHTML = `<div style="font-size:11px;color:var(--danger)">${errText}</div>`;
    return;
  }
  const data = await resp.json();
  resultsEl.innerHTML = '';

  if (mediaType === 'video') {
    const videos = data.videos || [];
    videos.forEach(video => {
      const thumb = document.createElement('div');
      thumb.className = 'pexels-thumb video-thumb';
      const thumbPic = (video.video_pictures && video.video_pictures[0]) ? video.video_pictures[0].picture : '';
      const duration = video.duration ? `${video.duration}s` : '';
      thumb.innerHTML = `<img src="${thumbPic}" alt="video" />${duration ? `<span class="duration-badge">${duration}</span>` : ''}`;
      thumb.addEventListener('click', () => {
        resultsEl.querySelectorAll('.pexels-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
        const files = (video.video_files || []).filter(f => f.file_type === 'video/mp4');
        files.sort((a, b) => (b.width || 0) - (a.width || 0));
        const chosen = files.find(f => (f.width || 0) <= 1920) || files[0];
        const videoUrl = chosen ? chosen.link : '';
        slideImages[idx] = { url: videoUrl, type: 'video', source: 'pexels', poster: thumbPic };
        const previewEl = document.getElementById(`preview-${idx}`);
        previewEl.innerHTML = `<video src="${videoUrl}" poster="${thumbPic}" controls muted loop></video>`;
      });
      resultsEl.appendChild(thumb);
    });
    if (videos.length === 0) {
      resultsEl.innerHTML = '<div style="font-size:11px;color:var(--text-dim)">Pexels 동영상 결과 없음</div>';
    }
  } else {
    const photos = data.photos || [];
    photos.forEach(photo => {
      const thumb = document.createElement('div');
      thumb.className = 'pexels-thumb';
      thumb.innerHTML = `<img src="${photo.src.small}" alt="${photo.alt || ''}" />`;
      thumb.addEventListener('click', () => {
        resultsEl.querySelectorAll('.pexels-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
        slideImages[idx] = { url: photo.src.medium, type: 'photo', source: 'pexels' };
        const previewEl = document.getElementById(`preview-${idx}`);
        previewEl.innerHTML = `<img src="${photo.src.medium}" />`;
      });
      resultsEl.appendChild(thumb);
    });
    if (photos.length === 0) {
      resultsEl.innerHTML = '<div style="font-size:11px;color:var(--text-dim)">Pexels 사진 결과 없음</div>';
    }
  }
}

async function searchPixabay(idx, query, mediaType, resultsEl) {
  if (!PIXABAY_KEY || PIXABAY_KEY === 'YOUR_PIXABAY_KEY_HERE') {
    resultsEl.innerHTML = '<div style="font-size:11px;color:var(--danger)">Pixabay API 키가 설정되지 않았습니다. pixabay.com/api/docs/ 에서 발급받아 교체하세요.</div>';

    : `https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=8&safesearch=true`;

  const resp = await fetch(endpoint);
  if (!resp.ok) {
    const errText = resp.status === 400 ? 'Pixabay API 키 무효' : resp.status === 429 ? 'Pixabay 쿼터 초과' : `Pixabay 에러 ${resp.status}`;

      const thumbPic = picId ? `https://i.vimeocdn.com/video/${picId}_640x360.jpg` : '';
      const duration = video.duration ? `${video.duration}s` : '';
      thumb.innerHTML = `<img src="${thumbPic}" alt="video" onerror="this.style.display='none'" />${duration ? `<span class="duration-badge">${duration}</span>` : ''}`;
      thumb.addEventListener('click', () => {
        resultsEl.querySelectorAll('.pexels-thumb').forEach(t => t.classList.remove('selected'));

        const videos = video.videos || {};
        const chosen = videos.medium || videos.small || videos.large || videos.tiny;
        const videoUrl = chosen ? chosen.url : '';
        slideImages[idx] = { url: videoUrl, type: 'video', source: 'pixabay', poster: thumbPic };
        const previewEl = document.getElementById(`preview-${idx}`);
        previewEl.innerHTML = `<video src="${videoUrl}" poster="${thumbPic}" controls muted loop></video>`;
      });
      resultsEl.appendChild(thumb);
    });
    if (videos.length === 0) {
      resultsEl.innerHTML = '<div style="font-size:11px;color:var(--text-dim)">Pixabay 동영상 결과 없음</div>';
    }
  } else {
    const photos = data.hits || [];
    photos.forEach(photo => {
      const thumb = document.createElement('div');
      thumb.className = 'pexels-thumb';
      thumb.innerHTML = `<img src="${photo.previewURL}" alt="${photo.tags || ''}" />`;
      thumb.addEventListener('click', () => {
        resultsEl.querySelectorAll('.pexels-thumb').forEach(t => t.classList.remove('selected'));
        thumb.classList.add('selected');
        const mediumUrl = photo.webformatURL || photo.largeImageURL || photo.previewURL;
        slideImages[idx] = { url: mediumUrl, type: 'photo', source: 'pixabay' };
        const previewEl = document.getElementById(`preview-${idx}`);
        previewEl.innerHTML = `<img src="${mediumUrl}" />`;
      });
      resultsEl.appendChild(thumb);
    });
    if (photos.length === 0) {
      resultsEl.innerHTML = '<div style="font-size:11px;color:var(--text-dim)">Pixabay 사진 결과 없음</div>';
    }
  }
}

function loadSlideImage(slideIdx, file) {
  const isVideo = file.type.startsWith('video/');
  const reader = new FileReader();
  reader.onload = e => {
    slideImages[slideIdx] = { url: e.target.result, type: isVideo ? 'video' : 'photo', source: 'upload' };
    const previewEl = document.getElementById(`preview-${slideIdx}`);
    if (previewEl) {
      previewEl.innerHTML = isVideo
        ? `<video src="${e.target.result}" controls muted loop></video>`
        : `<img src="${e.target.result}" />`;
    }
  };
  reader.readAsDataURL(file);
}

function formatBody(text) {
  // Bold: **text**
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Green highlight: {{text}}
  html = html.replace(/\{\{(.*?)\}\}/g, '<span class="hl">$1</span>');
  // Newlines
  html = html.replace(/\n/g, '<br/>');
  return html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ======== SELF REVIEW ========
async function runSelfReview() {
  const geminiKey = document.getElementById('geminiKey').value.trim();
  if (!geminiKey || !currentCarousel) return;

  const panel = document.getElementById('reviewPanel');
  panel.style.display = 'block';
  const content = document.getElementById('reviewContent');
  content.innerHTML = '<div style="text-align:center;padding:20px"><span class="loading"></span><div style="margin-top:8px;color:var(--text-dim)">Gemini로 자체 점검 중...</div></div>';

  const reviewPrompt = localStorage.getItem('cf_review_prompt') || DEFAULT_REVIEW_PROMPT;
  const carouselJson = JSON.stringify(currentCarousel, null, 2);

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `${reviewPrompt}\n\n## 캐러셀 데이터\n${carouselJson}` }] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
      })
    });

    if (!resp.ok) throw new Error(`Gemini API 오류 (${resp.status})`);

    const data = await resp.json();
    let text = data.candidates[0].content.parts[0].text.trim();
    const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) text = jsonMatch[1].trim();

    const review = JSON.parse(text);
    renderReview(review);
  } catch (e) {
    console.warn('Self-review skipped (Gemini error):', e.message);
    panel.style.display = 'none';
  }
}

function renderReview(review) {
  const total = review.total || (review.hook + review.data + review.flow + review.cta);
  const content = document.getElementById('reviewContent');
  content.innerHTML = `
    <div class="score-grid">
      <div class="score-item">
        <div class="score-label">훅 강도</div>
        <div class="score-value">${review.hook}</div>
      </div>
      <div class="score-item">
        <div class="score-label">데이터 근거</div>
        <div class="score-value">${review.data}</div>
      </div>
      <div class="score-item">
        <div class="score-label">흐름 논리성</div>
        <div class="score-value">${review.flow}</div>
      </div>
      <div class="score-item">
        <div class="score-label">CTA 명확성</div>
        <div class="score-value">${review.cta}</div>
      </div>
    </div>
    <div class="score-total">
      <span class="num">${total}</span><span class="max"> / 20</span>
    </div>
    <div style="font-size:13px;color:var(--text);margin-bottom:8px">${escapeHtml(review.feedback || '')}</div>
    ${review.suggestions && review.suggestions.length > 0 ? `
      <div style="font-size:12px;color:var(--text-dim)">
        ${review.suggestions.map(s => `<div style="margin-bottom:4px">- ${escapeHtml(s)}</div>`).join('')}
      </div>` : ''}
    ${total < 15 ? '<div class="warning-box">총점 15점 미만 - 재생성 권장</div>' : ''}
  `;
}

// ======== APPROVE & LEARNING ========
async function handleApprove() {
  if (!currentCarousel) return;

  if (feedbackHistory.length > 0) {
    const claudeKey = document.getElementById('claudeKey')?.value?.trim() || DEFAULT_CLAUDE_KEY;
    if (claudeKey) {
      showToast('학습 규칙 추출 중...');
      try {
        const sysPrompt = '사용자가 인스타그램 캐러셀 생성 중 남긴 피드백에서 일반화 가능한 규칙을 추출하세요. 짧고 명확한 한 줄 규칙으로, JSON 배열로만 출력하세요. 예: ["규칙1","규칙2"]';
        const userMsg = `피드백 목록:\n${feedbackHistory.join('\n')}`;
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': claudeKey,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4096,
            system: sysPrompt + '\n\nYou must respond with valid JSON only, no other text.',
            messages: [{ role: 'user', content: userMsg }]
          })
        });

        if (resp.ok) {
          const data = await resp.json();
          let text = data.content[0].text.trim();
          const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
          if (jsonMatch) text = jsonMatch[1].trim();
          const newRules = JSON.parse(text);
          if (Array.isArray(newRules)) {
            const existing = getLearnings();
            const merged = [...new Set([...existing, ...newRules])];
            localStorage.setItem('carousel_factory_learnings', JSON.stringify(merged));
            renderLearningRules();
          }
        }
      } catch (e) {
        console.error('Learning extraction failed:', e);
      }
    }
  }

  showToast('최종 승인 완료');
}

function getLearnings() {
  try {
    return JSON.parse(localStorage.getItem('carousel_factory_learnings') || '[]');
  } catch { return []; }
}

function renderLearningRules() {
  const rules = getLearnings();
  const el = document.getElementById('learningRules');
  if (rules.length === 0) {
    el.innerHTML = '<div style="font-size:11px;color:var(--text-dim)">아직 축적된 규칙이 없습니다.</div>';
    return;
  }
  el.innerHTML = rules.map(r => `<div class="rule-item">${escapeHtml(r)}</div>`).join('');
}

// ======== EXPORT ========
function copyExport(format) {
  if (!currentCarousel) { showToast('생성된 캐러셀이 없습니다'); return; }

  let text;
  if (format === 'json') {
    text = JSON.stringify(currentCarousel, null, 2);
  } else {
    text = jsonToYaml(currentCarousel);
  }

  navigator.clipboard.writeText(text).then(() => {
    showToast(`${format.toUpperCase()} 클립보드에 복사됨`);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`${format.toUpperCase()} 클립보드에 복사됨`);
  });
}

function jsonToYaml(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  let out = '';

  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    obj.forEach(item => {
      if (typeof item === 'object' && item !== null) {
        out += `${pad}-\n`;
        Object.entries(item).forEach(([k, v]) => {
          out += `${pad}  ${k}: ${formatYamlValue(v, indent + 2)}\n`;
        });
      } else {
        out += `${pad}- ${formatYamlValue(item, indent + 1)}\n`;
      }
    });
    return out;
  }

  if (typeof obj === 'object' && obj !== null) {
    Object.entries(obj).forEach(([k, v]) => {
      if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
        out += `${pad}${k}:\n${jsonToYaml(v, indent + 1)}`;
      } else if (Array.isArray(v)) {
        out += `${pad}${k}:\n${jsonToYaml(v, indent + 1)}`;
      } else {
        out += `${pad}${k}: ${formatYamlValue(v, indent)}\n`;
      }
    });
    return out;
  }

  return String(obj);
}

function formatYamlValue(v, indent) {
  if (v === null || v === undefined) return '~';
  if (typeof v === 'string') {
    if (v.includes('\n') || v.includes('"') || v.includes(':') || v.includes('#')) {
      return `"${v.replace(/"/g, '\\"').replace(/\n/g, '\\n')}"`;
    }
    return `"${v}"`;
  }
  if (typeof v === 'object') return '\n' + jsonToYaml(v, indent + 1);
  return String(v);
}

// ======== TOAST ========
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ======== PNG EXPORT ========
function formatBodyForPng(text) {
  if (!text) return '';
  let html = escapeHtml(text);
  html = html.replace(/\{\{([^}]+)\}\}/g, '<span class="hl">$1</span>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function buildPngSlideHtml(slideData, pageInfo) {
  const variant = slideData.variant || 'dark';
  const hasImage = slideData.imageUrl && slideData.imageType !== 'video';
  const hasVideoPoster = slideData.imageUrl && slideData.imageType === 'video' && slideData.poster;
  const imgSrc = hasVideoPoster ? slideData.poster : (hasImage ? slideData.imageUrl : '');

  const imageArea = imgSrc
    ? `<div class="png-image-area"><img src="${imgSrc}" crossorigin="anonymous" /></div>`
    : `<div class="png-image-area no-image"></div>`;

  const tag = slideData.tag ? `<span class="png-tag">${escapeHtml(slideData.tag)}</span>` : '';
  const hookNum = slideData.hookNumber ? `<span class="png-hook-number">${escapeHtml(slideData.hookNumber)}</span>` : '';
  const hookLabel = slideData.hookLabel ? `<span class="png-hook-label">${escapeHtml(slideData.hookLabel)}</span>` : '';
  const hookPhrase = (hookNum || hookLabel) ? `<div class="png-hook-phrase">${hookNum}${hookLabel}</div>` : '';
  const heading = slideData.heading ? `<div class="png-heading">${escapeHtml(slideData.heading)}</div>` : '';
  const body = slideData.body ? `<div class="png-body">${formatBodyForPng(slideData.body)}</div>` : '';
  const footer = `
    <div class="png-footer">
      <div class="png-brand-text"><div class="png-brand-logo">B</div><span>BDM Lab</span></div>
      <div class="png-page">${pageInfo}</div>
    </div>`;

  return `
    <div class="png-slide png-${variant}">
      ${imageArea}
      <div class="png-content">
        ${tag}
        ${hookPhrase}
        ${heading}
        ${body}
        ${footer}
      </div>
    </div>`;
}

async function waitForImagesLoaded(container) {
  const imgs = container.querySelectorAll('img');
  const promises = Array.from(imgs).map(img => {
    if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
    return new Promise(res => {
      img.onload = () => res();
      img.onerror = () => res(); // resolve even on error so we don't hang
      setTimeout(() => res(), 8000); // 8s timeout per image
    });
  });
  await Promise.all(promises);
}

async function urlToDataUrl(url) {
  if (!url) return null;
  if (url.startsWith('data:')) return url; // already data URL
  try {
    const resp = await fetch(url, { mode: 'cors' });
    if (!resp.ok) {
      console.warn('Image fetch failed', url, resp.status);
      return null;
    }
    const blob = await resp.blob();
    return await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result);
      reader.onerror = () => rej(reader.error);
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('urlToDataUrl error:', url, e.message);
    return null;
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// Persistent directory handle for the current session
let savedDirHandle = null;

async function pickOrGetSaveDirectory() {
  if (savedDirHandle) {
    try {
      const perm = await savedDirHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return savedDirHandle;
      const req = await savedDirHandle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') return savedDirHandle;
    } catch (e) { /* fallthrough */ }
  }
  if (!window.showDirectoryPicker) return null; // not supported (Safari/Firefox)
  try {
    const handle = await window.showDirectoryPicker({
      mode: 'readwrite',
      id: 'bdm-carousel-output',
      startIn: 'downloads'
    });
    savedDirHandle = handle;
    return handle;
  } catch (e) {
    if (e.name !== 'AbortError') console.error('folder pick failed:', e);
    return null;
  }
}

async function saveFileToDir(dirHandle, filename, blob) {
  const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(blob);
  await writable.close();
}

async function exportAllSlidesToPng() {
  if (!currentCarousel) {
    showToast('먼저 캐러셀을 생성하세요');
    return;
  }
  if (typeof html2canvas === 'undefined') {
    showToast('html2canvas 로딩 실패 (인터넷 확인)');
    return;
  }

  const btn = document.getElementById('downloadPng');
  btn.disabled = true;
  const origText = btn.textContent;

  // Build list of slides to render
  const c = currentCarousel;
  const pages = [];

  // Cover
  if (c.cover) {
    const coverImg = slideImages[-1] || {};
    pages.push({
      variant: 'dark',
      tag: 'HOOK',
      hookNumber: c.cover.hook_number || '',
      hookLabel: c.cover.hook_label || '',
      heading: c.cover.title || '',
      body: c.cover.subtitle || '',
      imageUrl: coverImg.url,
      imageType: coverImg.type,
      poster: coverImg.poster
    });
  }

  // Slides
  if (c.slides && Array.isArray(c.slides)) {
    c.slides.forEach((s, i) => {
      const img = slideImages[i] || {};
      const variant = (s.variant || 'dark').replace(/\|.*/, '');
      pages.push({
        variant,
        tag: s.tag || '',
        heading: s.heading || '',
        body: s.body || '',
        imageUrl: img.url,
        imageType: img.type,
        poster: img.poster
      });
    });
  }

  // Outro
  if (c.outro) {
    const outroImg = slideImages[999] || {};
    pages.push({
      variant: 'green',
      tag: 'CTA',
      heading: c.outro.closing || '',
      body: (c.outro.cta || '') + (c.outro.links && c.outro.links.length ? '\n\n' + c.outro.links.join(' / ') : ''),
      imageUrl: outroImg.url,
      imageType: outroImg.type,
      poster: outroImg.poster
    });
  }

  // Ask user to pick a save folder (or reuse existing handle)
  btn.textContent = '저장 폴더 선택 중...';
  const dirHandle = await pickOrGetSaveDirectory();
  const useFolder = !!dirHandle;

  if (!useFolder && typeof JSZip === 'undefined') {
    showToast('JSZip 로딩 실패 (인터넷 확인)');
    btn.disabled = false;
    btn.textContent = origText;
    return;
  }

  const container = document.getElementById('pngRenderContainer');
  const total = pages.length;
  let successCount = 0;
  const zip = useFolder ? null : new JSZip();

  try {
    for (let i = 0; i < pages.length; i++) {
      const page = pages[i];
      const pageInfo = `${String(i + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
      btn.textContent = `생성 중... ${i + 1}/${total}`;

      // Prefetch image as data URL to avoid CORS issues with html2canvas
      const imgUrlForRender = page.imageType === 'video' ? page.poster : page.imageUrl;
      let dataUrl = null;
      if (imgUrlForRender) {
        dataUrl = await urlToDataUrl(imgUrlForRender);
      }
      const pageForRender = { ...page, imageUrl: dataUrl, imageType: 'photo', poster: null };

      container.innerHTML = buildPngSlideHtml(pageForRender, pageInfo);
      await waitForImagesLoaded(container);
      await new Promise(r => setTimeout(r, 150));

      const slideEl = container.querySelector('.png-slide');
      try {
        const canvas = await html2canvas(slideEl, {
          width: 1080,
          height: 1350,
          scale: 1,
          useCORS: true,
          allowTaint: true,
          backgroundColor: null,
          logging: false
        });
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        if (blob) {
          const filename = `carousel_${String(i + 1).padStart(2, '0')}.png`;
          if (useFolder) {
            await saveFileToDir(dirHandle, filename, blob);
          } else {
            zip.file(filename, blob);
          }
          successCount++;
        } else {
          console.error(`Slide ${i + 1}: toBlob returned null (canvas may be tainted)`);
        }
      } catch (err) {
        console.error(`Slide ${i + 1} capture failed:`, err);
      }
    }

    if (successCount > 0) {
      if (useFolder) {
        showToast(`${successCount}/${total}장 "${dirHandle.name}" 폴더에 저장됨`);
      } else {
        btn.textContent = 'ZIP 생성 중...';
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const stamp = new Date().toISOString().slice(0, 16).replace(/[-:T]/g, '');
        downloadBlob(zipBlob, `carousel_${stamp}.zip`);
        showToast(`${successCount}/${total}장 ZIP 다운로드 완료`);
      }
    } else {
      showToast('PNG 생성 실패 (콘솔 확인)');
    }
  } finally {
    container.innerHTML = '';
    btn.disabled = false;
    btn.textContent = origText;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const pngBtn = document.getElementById('downloadPng');
  if (pngBtn) pngBtn.addEventListener('click', exportAllSlidesToPng);
});
</script>
