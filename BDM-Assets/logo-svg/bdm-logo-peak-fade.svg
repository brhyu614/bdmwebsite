<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900');</style>
  </defs>
  <!-- Background -->
  <circle cx="250" cy="250" r="248" fill="#0a0a0a"/>
  <!-- Gradient Ring -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
  <!-- Signal Bars -->
  <rect x="192" y="210" width="14" height="24" rx="2" fill="#059669"/>
  <rect x="210" y="195" width="14" height="39" rx="2" fill="#059669"/>
  <rect x="228" y="172" width="14" height="62" rx="2" fill="#059669"/>
  <rect x="246" y="148" width="14" height="86" rx="2" fill="#059669"/>
  <rect x="264" y="178" width="14" height="56" rx="2" fill="#1a3a2e"/>
  <rect x="282" y="204" width="14" height="30" rx="2" fill="#1a3a2e"/>
  <!-- BDM Text -->
  <text x="250" y="330" text-anchor="middle" font-family="Outfit, sans-serif" font-weight="900" font-size="110" fill="white" letter-spacing="-5">BDM</text>
</svg>
